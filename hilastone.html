<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hilastone</title>
<style>
  :root {
    --bg: #2b2118;
    --bg-parchment: #e9dcc0;
    --bg-parchment-deep: #ddc9a3;
    --bg-card: #f3e8cc;
    --bg-secondary: #e3d3ad;
    --bg-tertiary: #d8c294;
    --wood: #5c3a23;
    --wood-light: #7a4f2e;
    --wood-dark: #3a2415;
    --border: #b89968;
    --border-strong: #8a6a3f;
    --text: #3a2a18;
    --text-secondary: #6b5236;
    --text-tertiary: #8c7350;
    --accent: #7a8c4a;
    --accent-deep: #5e6f37;
    --accent-bg: rgba(122,140,74,0.16);
    --danger: #a8412c;
    --danger-bg: rgba(168,65,44,0.14);
    --success: #5e7a3a;
    --success-bg: rgba(94,122,58,0.14);
    --warn: #b9792c;
    --gold: #b8862f;
    --p1-color: #4a6fa5;
    --p2-color: #a5474a;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(ellipse at top left, rgba(122,79,46,0.25), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(58,36,21,0.4), transparent 55%),
      var(--wood-dark);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    font-size: 15px;
    line-height: 1.5;
    padding-bottom: 4rem;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 1rem; }
  h1 {
    font-size: 22px; font-weight: 700; margin: 0; letter-spacing: 0.02em;
    color: var(--gold); text-shadow: 0 1px 0 rgba(0,0,0,0.4);
    font-family: 'Iowan Old Style', Palatino, Georgia, serif;
  }
  h2 { font-size: 16px; font-weight: 700; margin: 0 0 10px; color: var(--text); }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  button {
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    cursor: pointer;
    transition: background 0.12s, transform 0.08s;
    box-shadow: 0 1px 0 rgba(255,255,255,0.3) inset, 0 1px 2px rgba(0,0,0,0.15);
  }
  button:hover { background: var(--bg-tertiary); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  button.primary { background: linear-gradient(180deg, var(--accent), var(--accent-deep)); color: #fbf6e8; border-color: var(--accent-deep); font-weight: 700; }
  button.primary:hover { filter: brightness(1.08); }
  button.danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
  button.success { background: var(--success-bg); color: var(--success); border-color: var(--success); }
  button.ghost { background: transparent; border-color: var(--border); box-shadow: none; }
  button.icon-btn { padding: 6px 9px; font-size: 14px; line-height: 1; }
  input, select {
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    padding: 8px 10px;
  }

  /* Topbar */
  .topbar {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 8px;
    padding: 10px 16px; border-radius: var(--radius-lg);
    background: linear-gradient(180deg, var(--wood-light), var(--wood));
    border: 2px solid var(--wood-dark);
    box-shadow: 0 3px 8px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.08) inset;
  }
  .topbar h1 { display: flex; align-items: center; gap: 8px; }
  .topbar h1::before { content: "✦"; color: var(--gold); }
  .topbar-right { display: flex; gap: 6px; align-items: center; }
  .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: rgba(0,0,0,0.25); color: #f0e3c0; border: 1px solid rgba(255,255,255,0.15);
  }

  /* Parchment panel base */
  .panel {
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.25), transparent 40%),
      var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.18), 0 0 0 4px rgba(184,153,104,0.12);
    position: relative;
  }

  /* Hand-builder screen */
  .setup-screen { padding: 1.5rem 0; }
  .setup-card { padding: 20px; margin-bottom: 16px; }
  .setup-card.panel {}
  .setup-card p.lead { color: var(--text-secondary); font-size: 13px; margin: 4px 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .field input { width: 100%; }
  .mode-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .mode-toggle button { flex: 1; }
  .mode-toggle button.active { background: linear-gradient(180deg, var(--accent), var(--accent-deep)); color: #fbf6e8; border-color: var(--accent-deep); font-weight: 600; }

  .pool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
    gap: 8px;
    max-height: 50vh;
    overflow-y: auto;
    padding: 4px;
    margin-bottom: 12px;
  }
  .pool-card {
    position: relative;
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--bg-tertiary);
    aspect-ratio: 1;
    transition: border-color 0.12s, transform 0.08s;
  }
  .pool-card:hover { transform: translateY(-1px); }
  .pool-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
  .pool-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pool-card .pc-cost {
    position: absolute; top: 3px; left: 3px; background: rgba(40,26,12,0.78);
    color: #f0e3c0; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px;
  }
  .pool-card .pc-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(40,26,12,0.9), transparent);
    color: #f0e3c0; font-size: 9px; padding: 10px 4px 3px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pool-card.selected::after {
    content: "✓"; position: absolute; top: 3px; right: 3px;
    background: var(--gold); color: #2b2118; width: 16px; height: 16px;
    border-radius: 50%; font-size: 10px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .pool-card.disabled { opacity: 0.3; cursor: not-allowed; }

  .hand-strip { display: flex; gap: 6px; overflow-x: auto; padding: 4px; margin-bottom: 12px; min-height: 50px; }
  .hand-strip .mini-card {
    flex-shrink: 0; width: 46px; height: 46px; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border-strong); position: relative;
  }
  .hand-strip .mini-card img { width: 100%; height: 100%; object-fit: cover; }
  .hand-strip .mini-card button {
    position: absolute; top: -2px; right: -2px; width: 16px; height: 16px;
    border-radius: 50%; padding: 0; font-size: 10px; line-height: 1;
    background: var(--danger); color: #fff; border: none;
  }
  .empty-hint { color: var(--text-tertiary); font-size: 12px; padding: 10px; text-align: center; font-style: italic; }

  /* Seat select */
  .select-screen { padding: 3rem 0; text-align: center; }
  .select-screen p.title { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--gold); }
  .select-screen p.sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
  .seat-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .seat-btn { padding: 16px 24px; font-size: 14px; font-weight: 600; min-width: 150px; }
  .seat-sub { display: block; font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin-top: 4px; }
  .loading { padding: 3rem 0; text-align: center; color: var(--text-secondary); font-size: 14px; }

  /* Main layout: board + side detail panel */
  .game-layout { display: grid; grid-template-columns: 1fr 300px; gap: 14px; align-items: start; }
  @media (max-width: 880px) {
    .game-layout { grid-template-columns: 1fr; }
  }
  .main-col { min-width: 0; }
  .side-col { position: sticky; top: 12px; }

  /* Board screen */
  .energy-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .energy-pill {
    flex: 1; min-width: 220px; border-radius: var(--radius-md);
    padding: 10px 14px;
  }
  .energy-pill .ep-top { display: flex; justify-content: space-between; align-items: center; }
  .energy-pill.panel {}
  .energy-pill .ep-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
  .energy-pill .ep-val { font-size: 20px; font-weight: 700; }
  .energy-pill .ep-btns { display: flex; gap: 4px; }
  .energy-pill .ep-btns button { padding: 3px 8px; font-size: 12px; }
  .energy-pill.p1 .ep-val { color: var(--p1-color); }
  .energy-pill.p2 .ep-val { color: var(--p2-color); }
  .energy-pill.locked { opacity: 0.85; }
  .energy-pill .ep-lock-note { font-size: 9px; color: var(--text-tertiary); font-style: italic; }
  .energy-pill .ep-quick-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 8px; }
  .energy-pill .ep-quick-row button { padding: 5px 2px; font-size: 11px; }
  .energy-pill .ep-bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 8px; }
  .energy-pill .ep-bottom-row button.primary { font-size: 11px; padding: 6px 10px; flex-shrink: 0; }
  .ep-free-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); cursor: pointer; }
  .ep-free-toggle .switch { width: 32px; height: 18px; }
  .ep-free-toggle .switch .slider::before { height: 12px; width: 12px; }
  .ep-free-toggle .switch input:checked + .slider::before { transform: translateX(14px); }

  .board {
    padding: 14px; margin-bottom: 14px;
  }
  .board.panel {}
  .board-row-label {
    font-size: 12px; font-weight: 700; color: var(--text-secondary); padding: 4px 6px 8px;
    text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; gap: 6px;
  }
  .board-row-label::before { content: "❧"; color: var(--border-strong); }
  .lanes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
  .lane {
    background: var(--bg-secondary);
    border-radius: var(--radius-md); border: 1px solid var(--border);
    padding: 8px; min-height: 100px; display: flex; flex-direction: column; gap: 6px;
    transition: opacity 0.15s;
    box-shadow: inset 0 1px 3px rgba(90,60,30,0.15);
  }
  .lane.disabled { opacity: 0.45; background: repeating-linear-gradient(45deg, var(--bg-secondary), var(--bg-secondary) 8px, var(--bg-tertiary) 8px, var(--bg-tertiary) 16px); }
  .lane-head { display: flex; justify-content: space-between; align-items: center; padding: 0 2px; }
  .lane-head .lane-name { font-size: 10px; color: var(--text-tertiary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .lane-toggle {
    font-size: 9px; padding: 2px 6px; border-radius: 10px; background: var(--bg-tertiary);
    border: 1px solid var(--border-strong); color: var(--text-tertiary); cursor: pointer;
  }
  .lane-toggle.active { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
  .lane-toggle.locked { opacity: 0.5; cursor: default; }

  /* 2x2 grid of units per lane */
  .unit-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
  }
  .unit-card {
    background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 8px;
    padding: 4px; display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; position: relative; text-align: center;
  }
  .unit-card.locked-unit { cursor: default; }
  .unit-card.locked-unit::before {
    content: "🔒"; position: absolute; top: 2px; right: 2px; font-size: 9px;
    background: rgba(40,26,12,0.55); border-radius: 50%; width: 14px; height: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .unit-card.disabled-unit { opacity: 0.45; }
  .unit-card.disabled-unit .uc-disabled-tag {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-8deg);
    font-size: 7px; font-weight: 900; color: var(--danger); background: rgba(40,26,12,0.75);
    padding: 1px 4px; border-radius: 4px; letter-spacing: 0.03em; pointer-events: none; white-space: nowrap;
  }
  .unit-card img { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; }
  .unit-card .uc-name { font-size: 9.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  .unit-card .uc-hp { font-size: 9px; color: var(--text-secondary); }
  .unit-card .uc-hp .hp-low { color: var(--danger); font-weight: 700; }
  .unit-card .uc-hp .uc-overhp-tag { color: var(--accent-deep); font-weight: 700; margin-left: 2px; }
  .uc-badge {
    position: absolute; font-size: 8px; font-weight: 900; padding: 1px 4px; border-radius: 6px;
    color: #fff; line-height: 1.4; pointer-events: none;
  }
  .uc-badge-dmg { top: 2px; left: 2px; background: var(--danger); }
  .uc-badge-over { top: 2px; right: 2px; background: var(--accent-deep); }
  .unit-card.locked-unit .uc-badge-over { right: 18px; }
  .unit-card.selected-detail { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); }
  .lane-empty-slot {
    border: 1px dashed var(--border); border-radius: 8px; min-height: 56px;
    display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 16px; opacity: 0.4;
  }
  .add-unit-btn {
    background: transparent; border: 1px dashed var(--border-strong); border-radius: 8px;
    padding: 6px; font-size: 10px; color: var(--text-tertiary); width: 100%; margin-top: 2px;
    box-shadow: none;
  }

  /* Hand row on board */
  .hand-section { padding: 12px; margin-bottom: 14px; }
  .hand-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .hand-cards { display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px; }
  .hand-card {
    flex-shrink: 0; width: 64px; cursor: pointer; border-radius: 8px; overflow: hidden;
    border: 2px solid var(--border-strong); background: var(--bg-secondary);
  }
  .hand-card img { width: 100%; height: 64px; object-fit: cover; display: block; }
  .hand-card .hc-name { font-size: 8.5px; text-align: center; padding: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hand-card .hc-cost { font-size: 8.5px; text-align: center; color: var(--text-tertiary); padding-bottom: 2px; }
  .hand-back {
    flex-shrink: 0; width: 44px; height: 64px; border-radius: 8px;
    background: repeating-linear-gradient(45deg, var(--wood-light), var(--wood-light) 6px, var(--wood) 6px, var(--wood) 12px);
    border: 1px solid var(--wood-dark); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #f0e3c0;
  }

  /* Graveyard */
  .graveyard-section { padding: 12px; margin-bottom: 14px; }
  .gy-row { display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px; min-height: 40px; }
  .gy-card { flex-shrink: 0; width: 36px; height: 36px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-strong); filter: sepia(0.5) grayscale(0.3); opacity: 0.8; }
  .gy-card img { width: 100%; height: 100%; object-fit: cover; }

  /* Side detail panel (replaces modal for unit info) */
  .detail-panel { padding: 16px; min-height: 220px; }
  .detail-panel-empty {
    color: var(--text-tertiary); font-size: 13px; text-align: center; padding: 2.5rem 1rem;
    font-style: italic;
  }
  .detail-panel-empty::before {
    content: "❧"; display: block; font-size: 24px; color: var(--border-strong); margin-bottom: 8px; font-style: normal;
  }
  .dp-head { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  .dp-head img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-strong); }
  .dp-head .dp-title { font-size: 16px; font-weight: 700; }
  .dp-head .dp-sub { font-size: 11px; color: var(--text-tertiary); }
  .dp-close { margin-left: auto; }
  .dp-ownership-note {
    font-size: 11px; color: var(--text-tertiary); background: var(--bg-secondary);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; margin-bottom: 12px;
    font-style: italic;
  }
  .hp-control { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 14px 0; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border); }
  .hp-control .hp-display { font-size: 26px; font-weight: 700; min-width: 70px; text-align: center; }
  .hp-control .hp-display .hp-max { font-size: 14px; color: var(--text-tertiary); font-weight: 400; }
  .hp-control .hp-display .hp-over { font-size: 14px; color: var(--accent-deep); font-weight: 700; margin-left: 2px; }
  .hp-btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
  .hp-btn-grid button { font-size: 12px; padding: 8px 4px; }
  .dp-section-hint { text-transform: none; font-weight: 400; letter-spacing: 0; color: var(--text-tertiary); font-size: 9.5px; }
  .stat-control { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border); }
  .stat-control .stat-display { font-size: 17px; font-weight: 700; min-width: 38px; text-align: center; }
  .stat-control .stat-display.over { color: var(--accent-deep); }
  .stat-control .stat-display.boost { color: var(--danger); }
  .stat-control button.ghost { font-size: 11px; padding: 6px 8px; }
  .dp-section { margin-bottom: 14px; }
  .dp-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 6px; font-weight: 700; }
  .ability-row { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
  .ability-row .ab-label { font-weight: 700; color: var(--accent-deep); font-size: 10.5px; margin-bottom: 2px; }
  .ability-row.passive .ab-label { color: var(--warn); }
  .dp-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .dp-actions button { flex: 1; min-width: 100px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  .toggle-row span { font-size: 12px; }
  .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; inset: 0; background: var(--bg-tertiary); border: 1px solid var(--border-strong); border-radius: 22px; cursor: pointer; transition: 0.15s; }
  .switch .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 2px; bottom: 2px; background: var(--text-tertiary); border-radius: 50%; transition: 0.15s; }
  .switch input:checked + .slider { background: var(--danger-bg); border-color: var(--danger); }
  .switch input:checked + .slider::before { transform: translateX(16px); background: var(--danger); }
  .switch input:disabled + .slider { opacity: 0.4; cursor: default; }

  .move-lane-options { display: flex; gap: 6px; }
  .move-lane-options button { flex: 1; }

  /* Modal still used for summon-pick flows (your own actions) */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(20,12,4,0.65); display: flex;
    align-items: center; justify-content: center; padding: 16px; z-index: 100;
  }
  .modal {
    background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border-strong);
    padding: 18px; max-width: 420px; width: 100%; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
  }
  .modal-head { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  .modal-head .mh-title { font-size: 16px; font-weight: 700; }
  .modal-head .mh-sub { font-size: 11px; color: var(--text-tertiary); }
  .modal-close { margin-left: auto; }

  .footer-actions { display: flex; gap: 8px; justify-content: center; margin-top: 18px; }
  .errorMsg { background: var(--danger-bg); color: var(--danger); padding: 10px 14px; border-radius: var(--radius-md); margin-bottom: 14px; font-size: 13px; border: 1px solid var(--danger); }
  a { color: var(--accent-deep); }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Loading...</div>
</div>

<script src="hilastone-data.js"></script>
<script>
// ---------------- Constants ----------------
const FIREBASE_CONFIG = { apiKey: "AIzaSyAvbBKj-KE4dYa_UyPq5OXB3rj3nrRTxQI", projectId: "hilastone-6d796" };
const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${FIREBASE_CONFIG.projectId}/databases/(default)/documents`;
const LANES = ["Left", "Center", "Right"];
const LANE_CAP = 4;
const BASE_ENERGY = 5;
const HAND_SIZE = 10;
const ADJACENT = { Left: ["Center"], Center: ["Left", "Right"], Right: ["Center"] };

function cardDef(name) { return CARDS.find(c => c.name === name); }
function getCardImage(name) { return CARD_IMAGES[name] || null; }

// ---------------- Firestore helpers ----------------
function fsValueToJs(v) {
  if (v == null) return null;
  if ("stringValue" in v) return v.stringValue;
  if ("integerValue" in v) return parseInt(v.integerValue, 10);
  if ("doubleValue" in v) return v.doubleValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("nullValue" in v) return null;
  if ("arrayValue" in v) return (v.arrayValue.values || []).map(fsValueToJs);
  if ("mapValue" in v) {
    const out = {};
    const fields = v.mapValue.fields || {};
    for (const k in fields) out[k] = fsValueToJs(fields[k]);
    return out;
  }
  return null;
}
function jsToFsValue(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "string") return { stringValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === "boolean") return { booleanValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(jsToFsValue) } };
  if (typeof v === "object") {
    const fields = {};
    for (const k in v) fields[k] = jsToFsValue(v[k]);
    return { mapValue: { fields } };
  }
  return { nullValue: null };
}
async function fsGetDoc(docId) {
  const url = `${FIRESTORE_BASE}/matches/${docId}?key=${FIREBASE_CONFIG.apiKey}`;
  const res = await fetch(url);
  if (res.status === 404) return null;
  if (!res.ok) throw new Error("Firestore read failed: " + res.status);
  const data = await res.json();
  return fsValueToJs({ mapValue: { fields: data.fields || {} } });
}
async function fsSetDoc(docId, obj) {
  const url = `${FIRESTORE_BASE}/matches/${docId}?key=${FIREBASE_CONFIG.apiKey}`;
  const body = { fields: jsToFsValue(obj).mapValue.fields };
  const res = await fetch(url, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error("Firestore write failed: " + res.status);
}

// ---------------- Game state ----------------
function uid() { return Math.random().toString(36).slice(2, 10); }

function freshGameState() {
  return {
    createdAt: Date.now(),
    phase: "setup", // setup -> playing
    players: {
      "1": { name: "Player 1", energy: BASE_ENERGY, hand: [], pool: [], boardLeft: [], boardCenter: [], boardRight: [], graveyard: [], laneDisabled: { Left: false, Center: false, Right: false }, handLocked: false, freeSummon: false },
      "2": { name: "Player 2", energy: BASE_ENERGY, hand: [], pool: [], boardLeft: [], boardCenter: [], boardRight: [], graveyard: [], laneDisabled: { Left: false, Center: false, Right: false }, handLocked: false, freeSummon: false },
    },
  };
}

function instanceFromCard(card) {
  return {
    instanceId: uid(),
    name: card.name,
    maxHp: card.hp,
    hp: card.hp,
    disabled: false,
    dmgBoost: 0,
    overHp: 0,
  };
}

function laneKey(lane) { return "board" + lane; }

// ---------------- App state ----------------
let matchId = new URLSearchParams(location.search).get("match") || "default";
let game = null;
let mySeat = Number(sessionStorage.getItem("hilastone-seat-" + matchId)) || null;
let pollTimer = null;
let errorMsg = null;
let modalState = null; // { type: 'addUnit'|'summon', ...} -- unit info now lives in the side panel, not a modal
let detailState = null; // { seat, lane, instanceId } -- drives the side detail panel
let setupPickMode = "manual"; // manual | random
let unsavedTimer = null;
let saveInFlight = false;   // true while a write request is on the wire
let dirty = false;          // true if local `game` has changes not yet confirmed saved
let pendingResave = false;  // true if more edits came in while a save was already in flight
let saveFailCount = 0;      // consecutive save failures, used for simple backoff

const app = document.getElementById("app");

function isCompatibleSave(data) {
  // Reject saves from older/incompatible versions of this app rather than
  // trying to patch an unknown shape — a stale doc on the same matchId
  // (e.g. from a previous version of the game) will otherwise cause a
  // silent render crash with no on-screen error.
  if (!data || !data.players || !data.players["1"] || !data.players["2"]) return false;
  const p = data.players["1"];
  return Array.isArray(p.hand) && Array.isArray(p.boardLeft) && (p.handLocked !== undefined || p.pool !== undefined);
}

async function loadGame(silent) {
  // Never let an incoming poll clobber edits we haven't confirmed saved yet —
  // this is what caused the rubberbanding: a poll would land mid-edit and
  // overwrite the in-memory game with stale server data.
  if (dirty || saveInFlight) return;
  try {
    const data = await fsGetDoc(matchId);
    if (dirty || saveInFlight) return; // re-check: an edit may have happened during the fetch
    if (data && isCompatibleSave(data)) {
      game = data;
      // backfill any missing fields from older saves of THIS version
      for (const seat of ["1", "2"]) {
        const p = game.players[seat];
        if (!p.pool) p.pool = [];
        if (!p.graveyard) p.graveyard = [];
        if (!p.laneDisabled) p.laneDisabled = { Left: false, Center: false, Right: false };
        if (p.handLocked === undefined) p.handLocked = false;
        if (p.freeSummon === undefined) p.freeSummon = false;
        for (const lane of LANES) {
          const units = p[laneKey(lane)] || [];
          for (const u of units) {
            if (u.dmgBoost === undefined) u.dmgBoost = 0;
            if (u.overHp === undefined) u.overHp = 0;
          }
        }
      }
      if (game.phase === undefined) game.phase = "setup";
    } else {
      game = freshGameState();
      await fsSetDoc(matchId, game);
    }
    errorMsg = null;
  } catch (e) {
    if (!silent) errorMsg = "Can't reach the server — check your connection.";
    console.error(e);
  }
  render();
}

async function saveGame() {
  if (saveInFlight) {
    // A save is already on the wire; remember to run again once it's done
    // instead of firing a second overlapping write.
    pendingResave = true;
    return;
  }
  saveInFlight = true;
  let failed = false;
  try {
    await fsSetDoc(matchId, game);
    errorMsg = null;
    saveFailCount = 0;
  } catch (e) {
    failed = true;
    saveFailCount++;
    errorMsg = "Couldn't save — retrying...";
    console.error(e);
  } finally {
    saveInFlight = false;
  }
  if (pendingResave || failed) {
    pendingResave = false;
    // Loop back through scheduleSave so further rapid edits still debounce,
    // and a failed save gets an automatic retry (with backoff) rather than
    // silently letting the next poll overwrite the unsaved change.
    scheduleSave(failed);
  } else {
    dirty = false;
  }
}

function scheduleSave(isRetry) {
  dirty = true;
  clearTimeout(unsavedTimer);
  // Back off on repeated failures (capped at 5s) so a network outage doesn't
  // hammer Firestore with a request every 250ms.
  const delay = isRetry ? Math.min(5000, 250 * Math.pow(2, saveFailCount)) : 250;
  unsavedTimer = setTimeout(saveGame, delay);
  render();
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => loadGame(true), 2500);
}

// ---------------- Setup screen (per-seat hand building) ----------------
function buildRandomPool(seat) {
  const shuffled = [...CARDS].sort(() => Math.random() - 0.5);
  const picks = shuffled.slice(0, HAND_SIZE).map(c => c.name);
  game.players[seat].pool = picks;
  scheduleSave();
}

function togglePoolPick(seat, name) {
  const p = game.players[seat];
  const idx = p.pool.indexOf(name);
  if (idx >= 0) {
    p.pool.splice(idx, 1);
  } else {
    if (p.pool.length >= HAND_SIZE) return;
    p.pool.push(name);
  }
  scheduleSave();
}

function lockHand(seat) {
  const p = game.players[seat];
  if (p.pool.length !== HAND_SIZE) return;
  p.hand = [...p.pool];
  p.handLocked = true;
  scheduleSave();
}

function unlockHand(seat) {
  const p = game.players[seat];
  p.handLocked = false;
  scheduleSave();
}

function bothLocked() {
  return game.players["1"].handLocked && game.players["2"].handLocked;
}

function startMatch() {
  game.phase = "playing";
  scheduleSave();
}

// ---------------- Ownership / permission helpers ----------------
// Honor-system enforcement: a seat may only mutate its own units, lanes, and
// energy. The opponent's pieces remain fully visible but are not clickable
// for edits — only the controlling player can alter them.
function isMine(seat) { return String(mySeat) === String(seat); }

// ---------------- Board actions ----------------
function summonFromHand(seat, name, lane) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const lk = laneKey(lane);
  if (p[lk].length >= LANE_CAP) return;
  const idx = p.hand.indexOf(name);
  if (idx < 0) return;
  const card = cardDef(name);
  if (!p.freeSummon && p.energy < card.cost) return;
  p.hand.splice(idx, 1);
  p[lk].push(instanceFromCard(card));
  if (!p.freeSummon) p.energy -= card.cost;
  scheduleSave();
  modalState = null;
}

function adjustHp(seat, lane, instanceId, delta) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const unit = p[lk].find(u => u.instanceId === instanceId);
  if (!unit) return;
  unit.hp = Math.max(0, Math.min(unit.maxHp, unit.hp + delta));
  scheduleSave();
}

function setHp(seat, lane, instanceId, value) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const unit = p[lk].find(u => u.instanceId === instanceId);
  if (!unit) return;
  unit.hp = Math.max(0, Math.min(unit.maxHp, value));
  scheduleSave();
}

function adjustDmgBoost(seat, lane, instanceId, delta) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const unit = p[lk].find(u => u.instanceId === instanceId);
  if (!unit) return;
  if (unit.dmgBoost === undefined) unit.dmgBoost = 0;
  unit.dmgBoost = Math.max(0, unit.dmgBoost + delta);
  scheduleSave();
}

function adjustOverHp(seat, lane, instanceId, delta) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const unit = p[lk].find(u => u.instanceId === instanceId);
  if (!unit) return;
  if (unit.overHp === undefined) unit.overHp = 0;
  unit.overHp = Math.max(0, unit.overHp + delta);
  scheduleSave();
}

function toggleUnitDisabled(seat, lane, instanceId) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const unit = p[lk].find(u => u.instanceId === instanceId);
  if (!unit) return;
  unit.disabled = !unit.disabled;
  scheduleSave();
}

function toggleLaneDisabled(seat, lane) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  p.laneDisabled[lane] = !p.laneDisabled[lane];
  scheduleSave();
}

function moveUnit(seat, fromLane, instanceId, toLane) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const fromKey = laneKey(fromLane);
  const toKeyName = laneKey(toLane);
  if (p[toKeyName].length >= LANE_CAP) return;
  const idx = p[fromKey].findIndex(u => u.instanceId === instanceId);
  if (idx < 0) return;
  const [unit] = p[fromKey].splice(idx, 1);
  p[toKeyName].push(unit);
  scheduleSave();
  detailState = { seat, lane: toLane, instanceId };
}

function defeatUnit(seat, lane, instanceId) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const idx = p[lk].findIndex(u => u.instanceId === instanceId);
  if (idx < 0) return;
  const [unit] = p[lk].splice(idx, 1);
  p.graveyard.push(unit.name);
  scheduleSave();
  detailState = null;
}

function adjustEnergy(seat, delta) {
  if (!isMine(seat)) return; // each player may only ever touch their own energy
  const p = game.players[seat];
  p.energy = Math.max(0, p.energy + delta);
  scheduleSave();
}

function setEnergy(seat, value) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  p.energy = Math.max(0, value);
  scheduleSave();
}

function toggleFreeSummon(seat) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  p.freeSummon = !p.freeSummon;
  scheduleSave();
}

function resetMatch() {
  if (!confirm("Start a brand new match? This clears the board for both players.")) return;
  game = freshGameState();
  scheduleSave();
}

// ---------------- Rendering ----------------
function render() {
  if (!game) { app.innerHTML = `<div class="loading">Loading...</div>`; return; }

  if (mySeat === null) {
    renderSeatSelect();
    return;
  }

  try {
    if (game.phase === "setup") {
      renderSetup();
    } else {
      renderBoard();
    }

    if (modalState) {
      renderModal();
    }
  } catch (e) {
    console.error("Render error:", e);
    boardMountedForSeat = null;
    app.innerHTML = `
      <div class="errorMsg" style="margin-top:2rem">
        Something went wrong rendering the board (likely a leftover save from an older version).
        <br><br>
        <button id="hardResetBtn" class="danger">Reset this match and start fresh</button>
      </div>`;
    const btn = document.getElementById("hardResetBtn");
    if (btn) btn.onclick = () => { game = freshGameState(); scheduleSave(); };
  }
}

function renderSeatSelect() {
  app.innerHTML = `
    <div class="select-screen">
      <p class="title">✦ Hilastone ✦</p>
      <p class="sub">Pick your seat for match "<strong>${escapeHtml(matchId)}</strong>"</p>
      <div class="seat-btns">
        <button class="seat-btn primary" id="seat1">Player 1<span class="seat-sub">${game.players["1"].handLocked ? "Hand locked" : "Building hand"}</span></button>
        <button class="seat-btn primary" id="seat2">Player 2<span class="seat-sub">${game.players["2"].handLocked ? "Hand locked" : "Building hand"}</span></button>
      </div>
      <p style="margin-top:24px;font-size:12px;color:var(--text-tertiary)">Share this link with your opponent so they can join as the other seat. Each seat only sees its own hand.</p>
    </div>
  `;
  document.getElementById("seat1").onclick = () => pickSeat(1);
  document.getElementById("seat2").onclick = () => pickSeat(2);
}

function pickSeat(n) {
  mySeat = n;
  sessionStorage.setItem("hilastone-seat-" + matchId, String(n));
  startPolling();
  render();
}

function renderSetup() {
  const seat = String(mySeat);
  const p = game.players[seat];
  const oppSeat = seat === "1" ? "2" : "1";
  const opp = game.players[oppSeat];

  let body = "";
  if (p.handLocked) {
    body = `
      <div class="setup-card panel">
        <h2>Hand locked in ✓</h2>
        <p class="lead">Waiting on ${opp.handLocked ? "the match to start" : "Player " + oppSeat + " to finish their hand"}.</p>
        <div class="hand-strip">${p.hand.map(n => miniCardHtml(n)).join("")}</div>
        <button class="ghost" id="unlockBtn">Edit hand</button>
      </div>
    `;
    if (bothLocked()) {
      body += `<div class="setup-card panel" style="text-align:center"><button class="primary" id="startBtn" style="width:100%;padding:14px;font-size:15px">Start Match</button></div>`;
    }
  } else {
    body = `
      <div class="setup-card panel">
        <h2>Build your hand</h2>
        <p class="lead">Pick exactly ${HAND_SIZE} characters from the pool, or draw randomly. (${p.pool.length}/${HAND_SIZE} selected)</p>
        <div class="mode-toggle">
          <button id="modeManual" class="${setupPickMode === "manual" ? "active" : ""}">Pick manually</button>
          <button id="modeRandom" class="${setupPickMode === "random" ? "active" : ""}">Random draw</button>
        </div>
        ${setupPickMode === "random" ? `<button class="ghost" id="rerollBtn" style="width:100%;margin-bottom:12px">🎲 Draw ${HAND_SIZE} random cards</button>` : ""}
        <div class="hand-strip">
          ${p.pool.length === 0 ? `<div class="empty-hint">No cards selected yet</div>` : p.pool.map(n => `
            <div class="mini-card"><img src="${getCardImage(n)}" alt="${n}"><button data-remove="${escapeHtml(n)}">×</button></div>
          `).join("")}
        </div>
        <div class="pool-grid">
          ${CARDS.map(c => `
            <div class="pool-card ${p.pool.includes(c.name) ? "selected" : ""} ${!p.pool.includes(c.name) && p.pool.length >= HAND_SIZE ? "disabled" : ""}" data-pick="${escapeHtml(c.name)}">
              <img src="${getCardImage(c.name)}" alt="${c.name}">
              <div class="pc-cost">${c.cost}⚡</div>
              <div class="pc-name">${c.name}</div>
            </div>
          `).join("")}
        </div>
        <button class="primary" id="lockBtn" style="width:100%;padding:12px" ${p.pool.length !== HAND_SIZE ? "disabled" : ""}>Lock In Hand (${p.pool.length}/${HAND_SIZE})</button>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="topbar">
      <h1>Hilastone</h1>
      <div class="topbar-right"><span class="badge">You are Player ${seat}</span></div>
    </div>
    ${errorMsg ? `<div class="errorMsg">${errorMsg}</div>` : ""}
    <div class="setup-screen">${body}</div>
  `;

  if (p.handLocked) {
    document.getElementById("unlockBtn").onclick = () => unlockHand(seat);
    if (bothLocked()) document.getElementById("startBtn").onclick = startMatch;
  } else {
    document.getElementById("modeManual").onclick = () => { setupPickMode = "manual"; render(); };
    document.getElementById("modeRandom").onclick = () => { setupPickMode = "random"; render(); };
    const reroll = document.getElementById("rerollBtn");
    if (reroll) reroll.onclick = () => buildRandomPool(seat);
    document.querySelectorAll("[data-pick]").forEach(el => {
      el.onclick = () => togglePoolPick(seat, el.dataset.pick);
    });
    document.querySelectorAll("[data-remove]").forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); togglePoolPick(seat, el.dataset.remove); };
    });
    document.getElementById("lockBtn").onclick = () => lockHand(seat);
  }
}

function miniCardHtml(name) {
  return `<div class="mini-card"><img src="${getCardImage(name)}" alt="${name}"></div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

// Track whether the board skeleton (the outer DOM shell) is already mounted
// for the current seat, so repeated renders only patch the specific sections
// that changed instead of reassigning innerHTML for the whole board. Every
// card image is an inline base64 data URI — reassigning innerHTML forces the
// browser to redecode every visible image on every click, which is the main
// cause of stutter/rubberbanding. Patching only changed sections keeps
// unrelated <img> nodes untouched so they're never redecoded.
let boardMountedForSeat = null;

function renderBoard() {
  const seat = String(mySeat);
  const oppSeat = seat === "1" ? "2" : "1";
  const p1 = game.players["1"];
  const p2 = game.players["2"];
  const me = game.players[seat];
  const opp = game.players[oppSeat];

  if (boardMountedForSeat !== seat || !document.getElementById("boardSkeleton")) {
    mountBoardSkeleton(seat);
    boardMountedForSeat = seat;
  }

  // Error banner
  const errBox = document.getElementById("errorBox");
  if (errBox) errBox.innerHTML = errorMsg ? `<div class="errorMsg">${errorMsg}</div>` : "";

  // Energy pills
  const energyRow = document.getElementById("energyRow");
  if (energyRow) {
    energyRow.innerHTML = energyPillHtml("1", p1) + energyPillHtml("2", p2);
    bindEnergyRowEvents();
  }

  // Board lanes (only this section contains the many per-unit card images)
  const lanesP1 = document.getElementById("lanesP1");
  const lanesP2 = document.getElementById("lanesP2");
  if (lanesP1) lanesP1.innerHTML = LANES.map(lane => laneHtml("1", lane)).join("");
  if (lanesP2) lanesP2.innerHTML = LANES.map(lane => laneHtml("2", lane)).join("");
  bindLaneEvents();

  // Hand
  const handHead = document.getElementById("myHandHead");
  if (handHead) handHead.innerHTML = `<h2>Your Hand (${me.hand.length})</h2>`;
  const handCards = document.getElementById("myHandCards");
  if (handCards) {
    handCards.innerHTML = me.hand.length === 0 ? `<div class="empty-hint">Empty</div>` : me.hand.map(name => {
      const c = cardDef(name);
      return `<div class="hand-card" data-handcard="${escapeHtml(name)}"><img src="${getCardImage(name)}" alt="${name}"><div class="hc-name">${name}</div><div class="hc-cost">${c.cost}⚡</div></div>`;
    }).join("");
    bindHandCardEvents(seat);
  }
  const oppHandHead = document.getElementById("oppHandHead");
  if (oppHandHead) oppHandHead.innerHTML = `<h2 style="font-size:13px;color:var(--text-tertiary)">Opponent's Hand (${opp.hand.length} cards)</h2>`;
  const oppHandCards = document.getElementById("oppHandCards");
  if (oppHandCards) oppHandCards.innerHTML = opp.hand.length === 0 ? `<div class="empty-hint">Empty</div>` : opp.hand.map(() => `<div class="hand-back">🂠</div>`).join("");

  // Graveyard
  const gyP1 = document.getElementById("gyP1");
  const gyP2 = document.getElementById("gyP2");
  if (gyP1) {
    document.getElementById("gyP1Label").textContent = `Player 1 (${p1.graveyard.length})`;
    gyP1.innerHTML = p1.graveyard.map(n => `<div class="gy-card"><img src="${getCardImage(n)}" alt="${n}"></div>`).join("") || `<div class="empty-hint">—</div>`;
  }
  if (gyP2) {
    document.getElementById("gyP2Label").textContent = `Player 2 (${p2.graveyard.length})`;
    gyP2.innerHTML = p2.graveyard.map(n => `<div class="gy-card"><img src="${getCardImage(n)}" alt="${n}"></div>`).join("") || `<div class="empty-hint">—</div>`;
  }

  // Side detail panel
  const sideCol = document.getElementById("sideCol");
  if (sideCol) {
    sideCol.innerHTML = detailPanelHtml();
    bindDetailPanelEvents();
  }
}

function mountBoardSkeleton(seat) {
  app.innerHTML = `
    <div id="boardSkeleton">
    <div class="topbar">
      <h1>Hilastone</h1>
      <div class="topbar-right">
        <span class="badge">You are Player ${seat}</span>
        <button class="ghost icon-btn" id="resetBtn" title="Reset match">↺</button>
      </div>
    </div>
    <div id="errorBox"></div>

    <div class="game-layout">
      <div class="main-col">
        <div class="energy-row" id="energyRow"></div>

        <div class="board panel">
          <div class="board-row-label">Player 1's lanes</div>
          <div class="lanes" id="lanesP1"></div>
          <div class="board-row-label">Player 2's lanes</div>
          <div class="lanes" id="lanesP2"></div>
        </div>

        <div class="hand-section panel">
          <div class="hand-section-head" id="myHandHead"></div>
          <div class="hand-cards" id="myHandCards"></div>
          <div class="hand-section-head" id="oppHandHead" style="margin-top:14px;margin-bottom:6px"></div>
          <div class="hand-cards" id="oppHandCards"></div>
        </div>

        <div class="graveyard-section panel">
          <div class="hand-section-head"><h2 style="font-size:13px">Graveyard</h2></div>
          <div style="display:flex;gap:14px">
            <div style="flex:1">
              <div id="gyP1Label" style="font-size:10px;color:var(--text-tertiary);margin-bottom:4px"></div>
              <div class="gy-row" id="gyP1"></div>
            </div>
            <div style="flex:1">
              <div id="gyP2Label" style="font-size:10px;color:var(--text-tertiary);margin-bottom:4px"></div>
              <div class="gy-row" id="gyP2"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="side-col" id="sideCol"></div>
    </div>
    </div>
  `;
  document.getElementById("resetBtn").onclick = resetMatch;
}

function bindEnergyRowEvents() {
  document.querySelectorAll("[data-energy]").forEach(el => {
    el.onclick = () => {
      const [s, d] = el.dataset.energy.split(",");
      adjustEnergy(s, Number(d));
    };
  });
  document.querySelectorAll("[data-setenergy5]").forEach(el => {
    el.onclick = () => setEnergy(el.dataset.setenergy5, BASE_ENERGY);
  });
  document.querySelectorAll("[data-freesummon]").forEach(el => {
    el.onchange = () => toggleFreeSummon(el.dataset.freesummon);
  });
}

function bindLaneEvents() {
  document.querySelectorAll("[data-unit]").forEach(el => {
    el.onclick = () => {
      const [s, lane, iid] = el.dataset.unit.split("|");
      detailState = { seat: s, lane, instanceId: iid };
      render();
    };
  });
  document.querySelectorAll("[data-addunit]").forEach(el => {
    el.onclick = () => {
      const [s, lane] = el.dataset.addunit.split("|");
      if (!isMine(s)) return;
      modalState = { type: "addUnit", seat: s, lane };
      render();
    };
  });
  document.querySelectorAll("[data-lanetoggle]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const [s, lane] = el.dataset.lanetoggle.split("|");
      toggleLaneDisabled(s, lane);
    };
  });
}

function bindHandCardEvents(seat) {
  document.querySelectorAll("[data-handcard]").forEach(el => {
    el.onclick = () => {
      modalState = { type: "summon", seat, name: el.dataset.handcard };
      render();
    };
  });
}

function energyPillHtml(seat, p) {
  const mine = isMine(seat);
  return `
    <div class="energy-pill panel p${seat} ${mine ? "" : "locked"}">
      <div class="ep-top">
        <div>
          <div class="ep-label">Player ${seat} Energy</div>
          <div class="ep-val">${p.energy}</div>
          ${mine ? "" : `<div class="ep-lock-note">Controlled by Player ${seat}</div>`}
        </div>
        ${mine
          ? `<div class="ep-btns"><button data-energy="${seat},-1">−1</button><button data-energy="${seat},1">+1</button></div>`
          : `<div class="ep-btns"><button class="ghost" disabled title="You can only adjust your own energy">🔒</button></div>`
        }
      </div>
      ${mine ? `
      <div class="ep-quick-row">
        <button class="danger" data-energy="${seat},-4">−4</button>
        <button class="danger" data-energy="${seat},-3">−3</button>
        <button class="danger" data-energy="${seat},-2">−2</button>
        <button class="success" data-energy="${seat},2">+2</button>
        <button class="success" data-energy="${seat},3">+3</button>
        <button class="success" data-energy="${seat},4">+4</button>
      </div>
      <div class="ep-bottom-row">
        <button class="primary" data-setenergy5="${seat}">Set to ${BASE_ENERGY}</button>
        <label class="ep-free-toggle">
          <span class="switch"><input type="checkbox" data-freesummon="${seat}" ${p.freeSummon ? "checked" : ""}><span class="slider"></span></span>
          <span>Free summon</span>
        </label>
      </div>
      ` : ""}
    </div>
  `;
}

function laneHtml(seat, lane) {
  const p = game.players[seat];
  const lk = laneKey(lane);
  const units = p[lk];
  const isDisabled = p.laneDisabled[lane];
  const mine = isMine(seat);
  const slots = [];
  for (let i = 0; i < LANE_CAP; i++) {
    if (units[i]) {
      slots.push(unitCardHtml(seat, lane, units[i]));
    } else if (mine && i === units.length) {
      slots.push(`<button class="add-unit-btn" data-addunit="${seat}|${lane}">+ Summon</button>`);
    } else {
      slots.push(`<div class="lane-empty-slot">·</div>`);
    }
  }
  return `
    <div class="lane ${isDisabled ? "disabled" : ""}">
      <div class="lane-head">
        <span class="lane-name">${lane}</span>
        <span class="lane-toggle ${isDisabled ? "active" : ""} ${mine ? "" : "locked"}" ${mine ? `data-lanetoggle="${seat}|${lane}"` : 'title="Only Player ' + seat + ' can toggle this lane"'}>${isDisabled ? "OFF" : "ON"}</span>
      </div>
      <div class="unit-grid">${slots.join("")}</div>
    </div>
  `;
}

function unitCardHtml(seat, lane, u) {
  const lowHp = u.hp <= Math.ceil(u.maxHp * 0.3);
  const mine = isMine(seat);
  const isSelected = detailState && detailState.instanceId === u.instanceId;
  return `
    <div class="unit-card ${u.disabled ? "disabled-unit" : ""} ${mine ? "" : "locked-unit"} ${isSelected ? "selected-detail" : ""}" data-unit="${seat}|${lane}|${u.instanceId}" title="${mine ? "" : "Opponent's unit — view only"}">
      <img src="${getCardImage(u.name)}" alt="${u.name}">
      ${u.dmgBoost > 0 ? `<div class="uc-badge uc-badge-dmg" title="Damage boost">⚔+${u.dmgBoost}</div>` : ""}
      ${u.overHp > 0 ? `<div class="uc-badge uc-badge-over" title="Over health">+${u.overHp}</div>` : ""}
      <div class="uc-name">${u.name}</div>
      <div class="uc-hp"><span class="${lowHp ? "hp-low" : ""}">${u.hp}</span>/${u.maxHp}${u.overHp > 0 ? `<span class="uc-overhp-tag">+${u.overHp}</span>` : ""}</div>
      ${u.disabled ? `<div class="uc-disabled-tag">DISABLED</div>` : ""}
    </div>
  `;
}

// ---------------- Side detail panel (replaces the old center-screen unit popup) ----------------
function detailPanelHtml() {
  if (!detailState) {
    return `
      <div class="detail-panel panel">
        <div class="detail-panel-empty">Select a character on the board to see its info here.</div>
      </div>
    `;
  }
  const { seat, lane, instanceId } = detailState;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const u = p[lk] ? p[lk].find(x => x.instanceId === instanceId) : null;
  if (!u) {
    detailState = null;
    return `
      <div class="detail-panel panel">
        <div class="detail-panel-empty">Select a character on the board to see its info here.</div>
      </div>
    `;
  }
  const def = cardDef(u.name);
  const canControl = isMine(seat);
  return `
    <div class="detail-panel panel">
      <div class="dp-head">
        <img src="${getCardImage(u.name)}" alt="${u.name}">
        <div>
          <div class="dp-title">${u.name}</div>
          <div class="dp-sub">${def.pronouns || ""} · Cost ${def.cost} · ${lane} lane</div>
        </div>
        <button class="ghost icon-btn dp-close" id="closeDetailBtn">✕</button>
      </div>

      ${canControl ? "" : `<div class="dp-ownership-note">This is Player ${seat}'s unit. You can see everything about it, but only they can change it (honor system).</div>`}

      <div class="hp-control">
        <button class="icon-btn" data-hp="-1" ${canControl ? "" : "disabled"}>−1</button>
        <div class="hp-display">${u.hp}${u.overHp > 0 ? `<span class="hp-over">+${u.overHp}</span>` : ""}<span class="hp-max"> / ${u.maxHp}</span></div>
        <button class="icon-btn" data-hp="1" ${canControl ? "" : "disabled"}>+1</button>
      </div>
      <div class="hp-btn-grid">
        <button class="danger" data-hp="-5" ${canControl ? "" : "disabled"}>−5</button>
        <button class="danger" data-hp="-2" ${canControl ? "" : "disabled"}>−2</button>
        <button class="success" data-hp="2" ${canControl ? "" : "disabled"}>+2</button>
        <button class="success" data-hp="5" ${canControl ? "" : "disabled"}>+5</button>
      </div>

      <div class="dp-section">
        <div class="dp-section-label">Over Health <span class="dp-section-hint">(heals above max HP)</span></div>
        <div class="stat-control">
          <button class="icon-btn" data-overhp="-1" ${canControl ? "" : "disabled"}>−1</button>
          <div class="stat-display over">${u.overHp || 0}</div>
          <button class="icon-btn" data-overhp="1" ${canControl ? "" : "disabled"}>+1</button>
          <button class="ghost" data-overhp="3" ${canControl ? "" : "disabled"}>+3</button>
          <button class="ghost" data-overhp="-99" ${canControl ? "" : "disabled"}>Clear</button>
        </div>
      </div>

      <div class="dp-section">
        <div class="dp-section-label">Damage Boost <span class="dp-section-hint">(buffs applied to this card)</span></div>
        <div class="stat-control">
          <button class="icon-btn" data-dmgboost="-1" ${canControl ? "" : "disabled"}>−1</button>
          <div class="stat-display boost">+${u.dmgBoost || 0}</div>
          <button class="icon-btn" data-dmgboost="1" ${canControl ? "" : "disabled"}>+1</button>
          <button class="ghost" data-dmgboost="3" ${canControl ? "" : "disabled"}>+3</button>
          <button class="ghost" data-dmgboost="-99" ${canControl ? "" : "disabled"}>Clear</button>
        </div>
      </div>

      <div class="dp-section">
        <div class="dp-section-label">Passive — ${def.passiveName}</div>
        <div class="ability-row passive"><div class="ab-label">Passive</div>${def.passive}</div>
      </div>
      <div class="dp-section">
        <div class="dp-section-label">Actions</div>
        <div class="ability-row"><div class="ab-label">Action 1 · Cost 1</div>${def.a1}</div>
        <div class="ability-row"><div class="ab-label">Action 2 · Cost 2</div>${def.a2}</div>
        <div class="ability-row"><div class="ab-label">Action 3 · Cost 3</div>${def.a3}</div>
      </div>

      <div class="toggle-row">
        <span>Disabled (visual flag only)</span>
        <label class="switch"><input type="checkbox" id="disableToggle" ${u.disabled ? "checked" : ""} ${canControl ? "" : "disabled"}><span class="slider"></span></label>
      </div>

      ${canControl ? `
      <div class="dp-section">
        <div class="dp-section-label">Move to lane</div>
        <div class="move-lane-options">
          ${LANES.filter(l => l !== lane).map(l => `<button data-move="${l}">${l}</button>`).join("")}
        </div>
      </div>
      ` : ""}

      ${canControl ? `
      <div class="dp-actions">
        <button class="danger" id="defeatBtn">Defeat → Graveyard</button>
      </div>
      ` : ""}
    </div>
  `;
}

function bindDetailPanelEvents() {
  if (!detailState) return;
  const { seat, lane, instanceId } = detailState;
  const closeBtn = document.getElementById("closeDetailBtn");
  if (closeBtn) closeBtn.onclick = () => { detailState = null; render(); };

  document.querySelectorAll("[data-hp]").forEach(el => {
    el.onclick = () => { adjustHp(seat, lane, instanceId, Number(el.dataset.hp)); render(); };
  });
  document.querySelectorAll("[data-overhp]").forEach(el => {
    el.onclick = () => { adjustOverHp(seat, lane, instanceId, Number(el.dataset.overhp)); render(); };
  });
  document.querySelectorAll("[data-dmgboost]").forEach(el => {
    el.onclick = () => { adjustDmgBoost(seat, lane, instanceId, Number(el.dataset.dmgboost)); render(); };
  });
  const disableToggle = document.getElementById("disableToggle");
  if (disableToggle) disableToggle.onchange = () => toggleUnitDisabled(seat, lane, instanceId);
  document.querySelectorAll("[data-move]").forEach(el => {
    el.onclick = () => { moveUnit(seat, lane, instanceId, el.dataset.move); render(); };
  });
  const defeatBtn = document.getElementById("defeatBtn");
  if (defeatBtn) defeatBtn.onclick = () => { defeatUnit(seat, lane, instanceId); render(); };
}

// ---------------- Modal (kept only for self-only summon flows) ----------------
function renderModal() {
  let html = "";
  if (modalState.type === "addUnit") {
    html = addUnitModalHtml();
  } else if (modalState.type === "summon") {
    html = summonModalHtml();
  }
  const wrap = document.createElement("div");
  wrap.className = "modal-backdrop";
  wrap.innerHTML = `<div class="modal">${html}</div>`;
  wrap.onclick = (e) => { if (e.target === wrap) closeModal(); };
  app.appendChild(wrap);
  bindModalEvents();
}

function closeModal() { modalState = null; render(); }

function addUnitModalHtml() {
  const { seat, lane } = modalState;
  const p = game.players[seat];
  return `
    <div class="modal-head">
      <div><div class="mh-title">Summon to ${lane}</div><div class="mh-sub">Choose a card from your hand</div></div>
      <button class="ghost icon-btn modal-close" id="closeModalBtn">✕</button>
    </div>
    <div class="hand-strip" style="flex-wrap:wrap;min-height:auto">
      ${p.hand.length === 0 ? `<div class="empty-hint">Your hand is empty</div>` : p.hand.map(name => {
        const c = cardDef(name);
        const afford = p.energy >= c.cost;
        return `<div class="mini-card" style="width:54px;height:54px;${afford ? "" : "opacity:0.4"}" data-summonpick="${escapeHtml(name)}">
          <img src="${getCardImage(name)}" alt="${name}">
        </div>`;
      }).join("")}
    </div>
  `;
}

function summonModalHtml() {
  const { seat, name } = modalState;
  const p = game.players[seat];
  const c = cardDef(name);
  const afford = p.energy >= c.cost;
  return `
    <div class="modal-head">
      <img src="${getCardImage(name)}" alt="${name}" style="width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border-strong)">
      <div>
        <div class="mh-title">${name}</div>
        <div class="mh-sub">${c.pronouns || ""} · Cost ${c.cost} · HP ${c.hp}</div>
      </div>
      <button class="ghost icon-btn modal-close" id="closeModalBtn">✕</button>
    </div>
    <div class="dp-section">
      <div class="dp-section-label">Passive — ${c.passiveName}</div>
      <div class="ability-row passive"><div class="ab-label">Passive</div>${c.passive}</div>
    </div>
    <div class="dp-section">
      <div class="dp-section-label">Actions</div>
      <div class="ability-row"><div class="ab-label">Action 1 · Cost 1</div>${c.a1}</div>
      <div class="ability-row"><div class="ab-label">Action 2 · Cost 2</div>${c.a2}</div>
      <div class="ability-row"><div class="ab-label">Action 3 · Cost 3</div>${c.a3}</div>
    </div>
    ${!afford ? `<p style="color:var(--danger);font-size:12px">Not enough energy (need ${c.cost}, have ${p.energy})</p>` : ""}
    <div class="dp-section">
      <div class="dp-section-label">Summon to lane</div>
      <div class="move-lane-options">
        ${LANES.map(l => {
          const full = p[laneKey(l)].length >= LANE_CAP;
          return `<button ${!afford || full ? "disabled" : ""} data-summonlane="${l}">${l}${full ? " (full)" : ""}</button>`;
        }).join("")}
      </div>
    </div>
  `;
}

function bindModalEvents() {
  const closeBtn = document.getElementById("closeModalBtn");
  if (closeBtn) closeBtn.onclick = closeModal;

  if (modalState.type === "addUnit") {
    const { seat, lane } = modalState;
    document.querySelectorAll("[data-summonpick]").forEach(el => {
      el.onclick = () => summonFromHand(seat, el.dataset.summonpick, lane);
    });
  } else if (modalState.type === "summon") {
    const { seat, name } = modalState;
    document.querySelectorAll("[data-summonlane]").forEach(el => {
      el.onclick = () => summonFromHand(seat, name, el.dataset.summonlane);
    });
  }
}

// ---------------- Init ----------------
loadGame();
if (mySeat !== null) startPolling();
</script>
</body>
</html>
