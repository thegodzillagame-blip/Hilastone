function sfxCtx() {
  if (!_sfxCtx) {
    _sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Decode audio samples as soon as we have a context
    fetch(EXPLOSION_DATA_URI)
      .then(r => r.arrayBuffer())
      .then(ab => _sfxCtx.decodeAudioData(ab))
      .then(buf => { _explosionBuffer = buf; })
      .catch(() => {});
    fetch(PEGGY_SUMMON_DATA_URI)
      .then(r => r.arrayBuffer())
      .then(ab => _sfxCtx.decodeAudioData(ab))
      .then(buf => { _peggySummonBuffer = buf; })
      .catch(() => {});
  }
  if (_sfxCtx.state === "suspended") _sfxCtx.resume();
  return _sfxCtx;
}

function playSfx(type) {
  const p = audioPrefs();
  if (!p.sfxOn || p.sfxVol === 0) return;
  const vol = p.sfxVol / 100;
  try {
    const ctx = sfxCtx();
    const t = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.setValueAtTime(vol, t);
    master.connect(ctx.destination);

    const recipes = {
      // Short percussive thud — card being placed onto the board
      summon: () => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = "sine"; o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(60, t+0.12);
        g.gain.setValueAtTime(0.7, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+0.18);
      },
      // Peggy's unique summon voice line
      peggy_summon: () => {
        if (!_peggySummonBuffer) { recipes.summon(); return; } // fall back to thud if not loaded
        const src2 = ctx.createBufferSource(); src2.buffer = _peggySummonBuffer;
        src2.connect(master); src2.start(t);
      },
      // Sharp mid-high crack — damage hit
      damage: () => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.6, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.08);
        src.connect(ng); ng.connect(master); src.start(t);
        o.type = "square"; o.frequency.setValueAtTime(320, t); o.frequency.exponentialRampToValueAtTime(80, t+0.07);
        g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.07);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+0.08);
      },
      // Explosion — real audio sample (trimmed to 2s)
      defeat: () => {
        if (!_explosionBuffer) {
          // Buffer not ready yet (still decoding) — fall back to synth thud
          const o = ctx.createOscillator(); const g = ctx.createGain();
          o.type = "sine"; o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(30, t+0.4);
          g.gain.setValueAtTime(0.8, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.4);
          o.connect(g); g.connect(master); o.start(t); o.stop(t+0.4);
          return;
        }
        const src = ctx.createBufferSource(); src.buffer = _explosionBuffer;
        src.connect(master); src.start(t);
      },
      // Rising soft chime — heal / HP gain
      heal: () => {
        [0, 0.08, 0.16].forEach((delay, i) => {
          const o = ctx.createOscillator(); const g = ctx.createGain();
          const freq = [523, 659, 784][i]; // C5, E5, G5 chord arp
          o.type = "sine"; o.frequency.setValueAtTime(freq, t+delay);
          g.gain.setValueAtTime(0, t+delay);
          g.gain.linearRampToValueAtTime(0.3, t+delay+0.03);
          g.gain.exponentialRampToValueAtTime(0.001, t+delay+0.25);
          o.connect(g); g.connect(master); o.start(t+delay); o.stop(t+delay+0.25);
        });
      },
      // Quick whoosh — unit moves lane
      move: () => {
        const buf = ctx.createBuffer(1, ctx.sampleRate*0.12, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5);
        const src = ctx.createBufferSource(); src.buffer=buf;
        const filt = ctx.createBiquadFilter(); filt.type="bandpass"; filt.frequency.setValueAtTime(2000,t); filt.frequency.exponentialRampToValueAtTime(400,t+0.12);
        const g = ctx.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
        src.connect(filt); filt.connect(g); g.connect(master); src.start(t);
      },
      // Dull blocked thud — move blocked, etc.
      blocked: () => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = "square"; o.frequency.setValueAtTime(90, t);
        g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+0.1);
      },
      // Metallic coin spin — coin flip
      coin: () => {
        const freqs = [1200, 1500, 1000, 1350];
        freqs.forEach((f, i) => {
          const o = ctx.createOscillator(); const g = ctx.createGain();
          const d = i*0.04;
          o.type = "sine"; o.frequency.setValueAtTime(f, t+d);
          g.gain.setValueAtTime(0.25, t+d); g.gain.exponentialRampToValueAtTime(0.001, t+d+0.18);
          o.connect(g); g.connect(master); o.start(t+d); o.stop(t+d+0.18);
        });
      },
      // Rattling dice roll — brief noise burst
      dice: () => {
        const buf = ctx.createBuffer(1, ctx.sampleRate*0.2, ctx.sampleRate);
        const d = buf.getChannelData(0);
        // Simulate multiple rattles
        for (let i=0;i<d.length;i++) {
          const env = Math.sin(i/d.length*Math.PI);
          d[i] = (Math.random()*2-1) * env * 0.8;
        }
        const src = ctx.createBufferSource(); src.buffer=buf;
        const filt = ctx.createBiquadFilter(); filt.type="highpass"; filt.frequency.value=800;
        const g = ctx.createGain(); g.gain.setValueAtTime(0.6,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
        src.connect(filt); filt.connect(g); g.connect(master); src.start(t);
      },
      // Bright sparkle — revive / Miles coming back
      revive: () => {
        [0,0.05,0.1,0.15,0.2].forEach((d,i)=>{
          const o=ctx.createOscillator(); const g=ctx.createGain();
          o.type="sine"; o.frequency.setValueAtTime(800+i*200, t+d);
          g.gain.setValueAtTime(0.2,t+d); g.gain.exponentialRampToValueAtTime(0.001,t+d+0.18);
          o.connect(g); g.connect(master); o.start(t+d); o.stop(t+d+0.18);
        });
      },
      // Bell ding — turn start / end turn
      turn: () => {
        const o=ctx.createOscillator(); const g=ctx.createGain();
        o.type="sine"; o.frequency.setValueAtTime(660,t);
        g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+0.5);
        // Harmonics
        const o2=ctx.createOscillator(); const g2=ctx.createGain();
        o2.type="sine"; o2.frequency.setValueAtTime(1320,t);
        g2.gain.setValueAtTime(0.15,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        o2.connect(g2); g2.connect(master); o2.start(t); o2.stop(t+0.35);
      },
      // Soft alert chime — passive triggers, auto-moves
      alert: () => {
        const o=ctx.createOscillator(); const g=ctx.createGain();
        o.type="triangle"; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(660,t+0.1);
        g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+0.25);
      },
    };
    if (recipes[type]) recipes[type]();
  } catch(e) {
    // Web Audio may be unavailable (old browser, security policy) — fail silently
  }
}

// Map engine event types to SFX
function sfxForEvent(evType) {
  switch(evType) {
    case "summon":               return "summon";
    case "damage":               return "damage";
    case "defeat":               return "defeat";
    case "heal":                 return "heal";
    case "move":                 return "move";
    case "move_blocked":         return "blocked";
    case "coin_flip":            return "coin";
    case "dice_roll":            return "dice";
    case "revive":               return "revive";
    case "turn_start":           return "turn";
    case "auto_summon_notice":
    case "auto_move_notice":
    case "passive_move_pending": return "alert";
    default:                     return null;
  }
}

// Called from engineAction and the poll path with the batch of new events.
function playSfxForEvents(events) {
  // Play at most one SFX per "category" per batch to avoid cacophony
  // (e.g. a 4-card lane wipe should play one defeat sound, not four).
  const seen = new Set();
  for (const ev of events) {
    // Peggy gets her own summon sound instead of the generic thud
    if (ev.type === "summon" && ev.cardName === "Peggy" && !seen.has("summon")) {
      seen.add("summon");
      playSfx("peggy_summon");
      continue;
    }
    const sfx = sfxForEvent(ev.type);
    if (sfx && !seen.has(sfx)) {
      seen.add(sfx);
      playSfx(sfx);
    }
  }
}


// ---------------- Firestore helpers ----------------
function fsValueToJs(v) {
  if (v == null) return null;
  if ("stringValue" in v) return v.stringValue;
  if ("integerValue" in v) return parseInt(v.integerValue, 10);
  if ("doubleValue" in v) return v.doubleValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("nullValue" in v) return null;
  if ("arrayValue" in v) return (v.arrayValue.values || []).map(fsValueToJs);
  if ("mapValue" in v) {
    const out = {};
    const fields = v.mapValue.fields || {};
    for (const k in fields) out[k] = fsValueToJs(fields[k]);
    return out;
  }
  return null;
}
function jsToFsValue(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "string") return { stringValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === "boolean") return { booleanValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(jsToFsValue) } };
  if (typeof v === "object") {
    const fields = {};
    for (const k in v) fields[k] = jsToFsValue(v[k]);
    return { mapValue: { fields } };
  }
  return { nullValue: null };
}
async function fsGetDoc(docId) {
  const url = `${FIRESTORE_BASE}/matches/${docId}?key=${FIREBASE_CONFIG.apiKey}`;
  const res = await fetch(url);
  if (res.status === 404) return null;
  if (!res.ok) throw new Error("Firestore read failed: " + res.status);
  const data = await res.json();
  return fsValueToJs({ mapValue: { fields: data.fields || {} } });
}
async function fsSetDoc(docId, obj) {
  const url = `${FIRESTORE_BASE}/matches/${docId}?key=${FIREBASE_CONFIG.apiKey}`;
  // Cap the log before serializing — it grows unboundedly and is the single
  // largest contributor to document size and save/poll latency. We only need
  // recent events for toast deduplication; older history is already rendered.
  const LOG_CAP = 200;
  let saveObj = obj;
  if (obj.log && obj.log.length > LOG_CAP) {
    saveObj = Object.assign({}, obj, { log: obj.log.slice(-LOG_CAP) });
  }
  const body = { fields: jsToFsValue(saveObj).mapValue.fields };
  const res = await fetch(url, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error("Firestore write failed: " + res.status);
}

// ---------------- Game state ----------------
// uid(), TURN_CLOCK_MS, freshGameState(), instanceFromCard(), laneKey() are
// now provided by engine-browser.js (loaded above) — the engine's state
// shape (statuses/flags/counters) is the only state shape in this version,
// extended in-place there with the app-level fields (pool, handLocked,
// phase, clock) this file still needs.

// ---------------- App state ----------------
let matchId = new URLSearchParams(location.search).get("match") || "default";
let game = null;
let mySeat = Number(sessionStorage.getItem("hilastone-seat-" + matchId)) || null;
let pollTimer = null;
let errorMsg = null;
let energyCorrectionOpen = null; // seat string ('1'|'2') currently showing the manual energy correction row, or null
let modalState = null; // { type: 'addUnit'|'summon', ...} -- unit info now lives in the side panel, not a modal
let detailState = null; // { seat, lane, instanceId } -- drives the side detail panel
let setupPickMode = "manual"; // manual | random
let unsavedTimer = null;
let saveInFlight = false;   // true while a write request is on the wire
let dirty = false;          // true if local `game` has changes not yet confirmed saved
let pendingResave = false;  // true if more edits came in while a save was already in flight
let saveFailCount = 0;      // consecutive save failures, used for simple backoff

const app = document.getElementById("app");

function isCompatibleSave(data) {
  // Reject saves from older/incompatible versions of this app rather than
  // trying to patch an unknown shape — a stale doc on the same matchId
  // (e.g. from a previous version of the game) will otherwise cause a
  // silent render crash with no on-screen error. This version's cutover to
  // the engine's state shape (statuses[]/flags{}/counters{} instead of flat
  // disabled/dmgBoost/overHp scalars) is NOT backward compatible with older
  // saves — there's no migration path, a doc from the old shape is simply
  // treated as incompatible and the match auto-resets.
  if (!data || !data.players || !data.players["1"] || !data.players["2"]) return false;
  const p = data.players["1"];
  if (!Array.isArray(p.hand) || !Array.isArray(p.boardLeft)) return false;
  if (p.handLocked === undefined && p.pool === undefined) return false;
  // Old-shape units carried `disabled`/`dmgBoost`/`overHp` scalars directly;
  // new-shape units carry `statuses`/`flags`/`counters`. If there's at least
  // one unit on the board, check its shape explicitly rather than guessing.
  const sampleUnit = p.boardLeft[0] || p.boardCenter[0] || p.boardRight[0];
  if (sampleUnit && sampleUnit.statuses === undefined) return false;
  return true;
}

let lastSeenLogLength = 0; // tracks game.log.length so polling can detect new RNG events from the opponent's actions

async function loadGame(silent) {
  // Never let an incoming poll clobber edits we haven't confirmed saved yet —
  // this is what caused the rubberbanding: a poll would land mid-edit and
  // overwrite the in-memory game with stale server data.
  if (dirty || saveInFlight) return;
  try {
    const data = await fsGetDoc(matchId);
    if (dirty || saveInFlight) return; // re-check: an edit may have happened during the fetch
    if (data && isCompatibleSave(data)) {
      game = data;
      // Backfill any missing fields from older saves of THIS (engine-native)
      // version — e.g. a match saved before a later field was added.
      for (const seat of ["1", "2"]) {
        const p = game.players[seat];
        if (!p.pool) p.pool = [];
        if (!p.graveyard) p.graveyard = [];
        if (!p.pendingEffects) p.pendingEffects = [];
        if (p.handLocked === undefined) p.handLocked = false;
        if (p.endedLastTurnAtZeroEnergy === undefined) p.endedLastTurnAtZeroEnergy = false;
        for (const lane of LANES) {
          const units = p[laneKey(lane)] || [];
          for (const u of units) {
            if (!u.statuses) u.statuses = [];
            if (!u.flags) u.flags = {};
            if (!u.counters) u.counters = {};
          }
        }
      }
      if (game.phase === undefined) game.phase = "setup";
      if (game.currentTurn === undefined) game.currentTurn = "1";
      if (game.turnNumber === undefined) game.turnNumber = 1;
      if (!game.log) game.log = [];
      if (!game.clockMs) game.clockMs = { "1": TURN_CLOCK_MS, "2": TURN_CLOCK_MS };
      if (game.clockRunning === undefined) game.clockRunning = false;
      if (game.lastTickAt === undefined) game.lastTickAt = null;
      engine = null; // force re-wrap around the freshly-loaded object

      // Surface coin flips/dice rolls that arrived via this poll (i.e. the
      // OPPONENT triggered them) — engineAction() already handles the case
      // where the toast comes from an action *this* client just resolved,
      // but the opponent's RNG results only ever show up here, as new
      // entries appended to game.log since we last looked at it.
      if (game.log.length > lastSeenLogLength && lastSeenLogLength > 0) {
        const newEvents = game.log.slice(lastSeenLogLength);
        const rngEvents = newEvents.filter(ev => ev.type === "coin_flip" || ev.type === "dice_roll" || ev.type === "auto_summon_notice" || ev.type === "auto_move_notice");
        if (rngEvents.length) {
          const unitNameFor = (instanceId) => {
            if (!instanceId) return null;
            const found = findUnit(game, instanceId);
            return found ? found.unit.name : null;
          };
          const text = rngEvents.map(ev => describeRngEvent(ev, unitNameFor)).filter(Boolean).join("  •  ");
          if (text) showRngToast(text);
        }
        // Detect deferred passive moves arriving via poll (Maxine's owner sees this
        // when the opponent attacked Maxine and the engine queued a move choice).
        const pendingMovesPolled = newEvents.filter(ev => ev.type === "passive_move_pending");
        for (const pm of pendingMovesPolled) {
          if (String(mySeat) === String(pm.seat) && !passiveMoveState) {
            passiveMoveState = { instanceId: pm.instanceId, cardName: pm.cardName, seat: pm.seat, currentLane: pm.currentLane };
          }
        }
        // Play SFX for opponent's events that arrived via poll
        playSfxForEvents(newEvents);
      }
      lastSeenLogLength = game.log.length;
    } else {
      game = freshGameState();
      await fsSetDoc(matchId, game);
      lastSeenLogLength = game.log.length;
    }
    errorMsg = null;
  } catch (e) {
    if (!silent) errorMsg = "Can't reach the server — check your connection.";
    console.error(e);
  }
  render();
}

async function saveGame() {
  if (saveInFlight) {
    // A save is already on the wire; remember to run again once it's done
    // instead of firing a second overlapping write.
    pendingResave = true;
    return;
  }
  saveInFlight = true;
  let failed = false;
  try {
    await fsSetDoc(matchId, game);
    errorMsg = null;
    saveFailCount = 0;
  } catch (e) {
    failed = true;
    saveFailCount++;
    errorMsg = "Couldn't save — retrying...";
    console.error(e);
  } finally {
    saveInFlight = false;
  }
  if (pendingResave || failed) {
    pendingResave = false;
    // Loop back through scheduleSave so further rapid edits still debounce,
    // and a failed save gets an automatic retry (with backoff) rather than
    // silently letting the next poll overwrite the unsaved change.
    scheduleSave(failed);
  } else {
    dirty = false;
  }
}

function scheduleSave(isRetry) {
  dirty = true;
  clearTimeout(unsavedTimer);
  // Back off on repeated failures (capped at 5s) so a network outage doesn't
  // hammer Firestore with a request every 250ms.
  const delay = isRetry ? Math.min(5000, 250 * Math.pow(2, saveFailCount)) : 250;
  unsavedTimer = setTimeout(saveGame, delay);
  // Do NOT call render() here — engineAction() already renders synchronously
  // on the success path, and loadGame() renders after each poll. Adding a
  // third render here just creates redundant paints without any visual benefit.
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => loadGame(true), 3000);
}

let clockTickTimer = null;
function startClockTick() {
  clearInterval(clockTickTimer);
  // Updates only the turn bar's DOM once a second so the clock visibly
  // counts down, without re-rendering the whole board (which would risk
  // disrupting things like an open modal or in-progress clicks elsewhere).
  clockTickTimer = setInterval(() => {
    if (!game || game.phase !== "playing" || !game.clockRunning) return;
    const turnBar = document.getElementById("turnBar");
    if (!turnBar) return;
    const seat = String(mySeat);
    turnBar.innerHTML = turnBarHtml(seat);
    const endTurnBtn = document.getElementById("endTurnBtn");
    if (endTurnBtn) endTurnBtn.onclick = () => endTurn(seat);
  }, 1000);
}

// ---------------- Setup screen (per-seat hand building) ----------------
function buildRandomPool(seat) {
  // Exclude DLC (special characters) and banished cards from random draw —
  // they should only enter a hand if explicitly picked manually.
  const eligible = CARDS.filter(c => !c.dlc && !c.banished);
  const shuffled = eligible.sort(() => Math.random() - 0.5);
  const picks = shuffled.slice(0, HAND_SIZE).map(c => c.name);
  game.players[seat].pool = picks;
  scheduleSave();
  render(); // show the new draw immediately without waiting for the next poll
}

function togglePoolPick(seat, name) {
  const p = game.players[seat];
  const idx = p.pool.indexOf(name);
  if (idx >= 0) {
    p.pool.splice(idx, 1);
  } else {
    if (p.pool.length >= HAND_SIZE) return;
    p.pool.push(name);
  }
  scheduleSave();
  render();
}

function lockHand(seat) {
  const p = game.players[seat];
  if (p.pool.length !== HAND_SIZE) return;
  p.hand = [...p.pool];
  p.handLocked = true;
  scheduleSave();
  render();
}

function unlockHand(seat) {
  const p = game.players[seat];
  p.handLocked = false;
  scheduleSave();
  render();
}

function bothLocked() {
  return game.players["1"].handLocked && game.players["2"].handLocked;
}

function startMatch() {
  game.phase = "playing";
  game.currentTurn = "1";
  game.clockRunning = true;
  game.lastTickAt = Date.now();
  scheduleSave();
  render();
}

// ---------------- Ownership / permission helpers ----------------
// Honor-system enforcement: a seat may only mutate its own units, lanes, and
// energy. The opponent's pieces remain fully visible but are not clickable
// for edits — only the controlling player can alter them.
function isMine(seat) { return String(mySeat) === String(seat); }

// ---------------- Board actions (engine-resolved) ----------------
// ---------------- Engine wiring ----------------
// Builds the engine's cardDefs map (structured {hp,cost,passive,actions})
// from the live CARDS array (which carries both display text AND the
// structured *Data fields merged in by the Phase 2/3 conversion). DLC cards
// without actionsData are simply omitted — they're not auto-resolvable, and
// summoning them routes through the legacy manual-only path (see
// isAutoResolvable below).
function buildEngineCardDefs() {
  const defs = {};
  for (const c of CARDS) {
    if (!c.actionsData || !c.passiveData) continue; // DLC / not yet converted
    defs[c.name] = {
      hp: c.hp,
      cost: c.cost,
      passive: c.passiveData,
      actions: c.actionsData,
    };
    if (c.requires) defs[c.name].requires = c.requires;
    // Manually-activated passive trigger (Tanker's mode switch, and any
    // future card with the same shape) — kept separate from `actions` so it
    // never gets treated as a 4th numbered combat action. See
    // Engine.lookupAction's "passive" sentinel.
    if (c.passiveActionData) defs[c.name].passiveAction = c.passiveActionData;
  }
  return defs;
}

function isAutoResolvable(name) {
  const c = cardDef(name);
  return !!(c && c.actionsData && c.passiveData);
}

const ENGINE_CARD_DEFS = buildEngineCardDefs();

// One Engine instance wraps the live `game` state object directly — the
// engine mutates `game` in place (same object identity), so the existing
// scheduleSave()/Firestore plumbing keeps working unchanged: any engine call
// that touches `game` just needs a scheduleSave() afterward, exactly like
// the old manual functions did.
let engine = null;
function ensureEngine() {
  if (!game) return null;
  // Re-create lazily whenever `game` itself is swapped out (new match,
  // loaded from Firestore, etc.) so the engine always wraps the CURRENT
  // state object rather than a stale one. The RNG is seeded once here and
  // then advances naturally across every subsequent coin_flip/dice_roll
  // call for the lifetime of this client session — only the RESOLVING
  // client's RNG result is ever used/saved (see engine design notes), so
  // there's no need to reseed per action.
  if (!engine || engine.state !== game) {
    engine = new Engine(ENGINE_CARD_DEFS, game, Date.now() ^ Math.floor(Math.random() * 0xffffffff));
  }
  return engine;
}

// getContinuousState() does a full board scan (every unit, every lane, both
// seats) to compute one unit's live status bag — necessarily, since e.g.
// Andromeda's boost or Ellie Ember's lockdown depend on who else shares the
// lane right now. That's fine called once, but unitCardHtml/detailPanelHtml
// were each calling it 1-2x per unit independently, so a 6-unit board did
// dozens of full board scans on every single render. This cache makes it
// once-per-unit-per-render: cleared at the top of render() (see below), then
// memoized by instanceId for the rest of that render pass.
let continuousStateCache = new Map();
function getContinuousStateCached(unit) {
  if (continuousStateCache.has(unit.instanceId)) return continuousStateCache.get(unit.instanceId);
  const eng = ensureEngine();
  const result = eng ? eng.getContinuousState(unit) : null;
  continuousStateCache.set(unit.instanceId, result);
  return result;
}
// ---------------- Board actions (engine-resolved) ----------------
// Every action below replaces an old manual scalar-mutation function. Each
// one: (1) checks isMine via the engine's own seat ownership where relevant,
// (2) calls into the engine, (3) catches engine errors into errorMsg rather
// than throwing (so a misclick — e.g. "not enough energy" — surfaces as a
// banner instead of a silent failure or a console-only crash), (4) schedules
// a save exactly like the old functions did.

let rngToast = null; // { text, ts } -- last coin flip / dice roll result, shown as a banner
let rngToastTimer = null;

function describeRngEvent(ev, unitNameFor) {
  if (ev.type === "coin_flip") {
    const who = unitNameFor(ev.actorInstanceId);
    return `🪙 Coin flip${who ? ` (${who})` : ""}: ${ev.heads ? "Heads" : "Tails"}`;
  }
  if (ev.type === "dice_roll") {
    const who = unitNameFor(ev.actorInstanceId);
    return `🎲 Roll${who ? ` (${who})` : ""}: ${ev.roll} (d${ev.sides})`;
  }
  if (ev.type === "auto_summon_notice") {
    return `⚠️ Auto-summon: Player ${ev.seat} summoned ${ev.cardName} to the ${ev.lane} lane (passive)`;
  }
  if (ev.type === "auto_move_notice") {
    return `⚠️ ${ev.cardName} auto-moved: ${ev.from} → ${ev.to} (passive)`;
  }
  return null;
}

function showRngToast(text) {
  rngToast = { text, ts: Date.now() };
  if (rngToastTimer) clearTimeout(rngToastTimer);
  rngToastTimer = setTimeout(() => { rngToast = null; render(); }, 6000);
}

function engineAction(fn) {
  // Shared try/catch wrapper: runs `fn`, surfaces engine errors as the
  // existing errorMsg banner, and only schedules a save if the action
  // actually went through (an engine throw means NOTHING was mutated, since
  // every engine action validates before mutating). Also captures any
  // coin_flip/dice_roll events produced during this single call and surfaces
  // them as a toast — previously these RNG results were only ever written to
  // game.log/engine.events and never actually shown to either player.
  const eng = ensureEngine();
  if (!eng) return false;
  const startLen = eng.events.length;
  try {
    fn(eng);
    errorMsg = null;
    const newEvents = eng.events.slice(startLen);
    const rngEvents = newEvents.filter(ev => ev.type === "coin_flip" || ev.type === "dice_roll" || ev.type === "auto_summon_notice" || ev.type === "auto_move_notice");
    if (rngEvents.length) {
      const unitNameFor = (instanceId) => {
        if (!instanceId) return null;
        const found = findUnit(game, instanceId);
        return found ? found.unit.name : null;
      };
      const text = rngEvents.map(ev => describeRngEvent(ev, unitNameFor)).filter(Boolean).join("  •  ");
      if (text) showRngToast(text);
    }
    // Play SFX for this action's events
    playSfxForEvents(newEvents);
    // Check for deferred passive moves (Maxine: "move to a different lane" on-attacked).
    // The engine can't open a UI picker mid-resolve, so it emits passive_move_pending
    // and we catch it here to prompt the owning player for a lane choice.
    const pendingMoves = newEvents.filter(ev => ev.type === "passive_move_pending");
    for (const pm of pendingMoves) {
      if (String(mySeat) === String(pm.seat)) {
        // It's this player's card — show the picker
        passiveMoveState = { instanceId: pm.instanceId, cardName: pm.cardName, seat: pm.seat, currentLane: pm.currentLane };
      }
    }
    // Keep the poll-side dedupe cursor in sync with what we just showed
    // locally, so the next loadGame() poll (which will fetch this same
    // action back from Firestore once saved) doesn't re-surface the same
    // coin flip/dice roll/auto-summon a second time as if the opponent had triggered it.
    lastSeenLogLength = game.log.length;
    scheduleSave();
    render(); // repaint immediately so modal/state changes are visible right away
    return true;
  } catch (e) {
    errorMsg = e.message || "That action couldn't be completed.";
    render();
    return false;
  }
}

function summonFromHand(seat, name, lane, opts) {
  if (!isMine(seat)) return;
  if (!isAutoResolvable(name)) {
    errorMsg = name + " doesn't have automatic resolution data yet (DLC card) — summon manually isn't supported in this version.";
    render();
    return;
  }

  // If the card has on_place effects that need player choices (e.g. Venia's
  // forced defeats), collect those choices BEFORE the summon fires. We reuse
  // the actionTargetState picker flow: set it up as a synthetic "action" on
  // the summon, collect all picks, then call summonFromHand again with the
  // choices merged into opts.passiveTargets.
  const onPlaceNeeds = computeOnPlaceNeeds(name, seat);
  const alreadyHaveTargets = opts && opts.passiveTargets;
  if (onPlaceNeeds.length > 0 && !alreadyHaveTargets) {
    // Close modal first so the board is visible for clicking targets
    modalState = null;
    // Set up actionTargetState as if this is an action — but the "resolve"
    // callback will call summonFromHand again with the collected targets.
    actionTargetState = {
      seat, instanceId: null, actionIndex: null,
      action: null, needs: onPlaceNeeds, needIndex: 0, collected: {},
      // Custom resolve: called by advanceTargetCollection when all picks done
      onComplete: (collected) => {
        summonFromHand(seat, name, lane, Object.assign({}, opts || {}, { passiveTargets: collected }));
      },
    };
    render();
    return;
  }

  // Close the modal BEFORE the engine action runs: engineAction's success
  // path calls scheduleSave() -> render() synchronously, so if modalState
  // were cleared only after engineAction() returns, that render would still
  // see the modal open and the close would never actually reach the screen
  // until some later unrelated render.
  modalState = null;
  engineAction(eng => eng.summon(seat, name, lane, opts || {}));
}

// Resolves a card action (a1/a2/a3). `targets` follows the engine's target
// shape: { singleTarget, lane, destination, handCardChoice, stealCardIndex,
// copySourceInstanceId, copyActionIndex, copiedTargets, ... } depending on
// what the specific action needs — see actionTargetRequirement() below,
// which the UI consults to know what to collect before calling this.
function resolveCardAction(seat, instanceId, actionIndex, targets) {
  if (!isMine(seat)) return;
  // Same ordering fix as summonFromHand: clear actionTargetState BEFORE the
  // engine action runs, since engineAction's success path renders
  // synchronously via scheduleSave() and would otherwise paint one more
  // frame of the now-stale "pick a target" UI before this function's own
  // cleanup line ever got a chance to run.
  actionTargetState = null;
  engineAction(eng => eng.resolveAction(seat, instanceId, actionIndex, targets || {}));
  detailState && (detailState.instanceId = instanceId); // keep panel open on the same unit after resolving
}

// Called when the player picks a lane for Maxine's passive move (or any
// future on_attacked move with destination:"choice"). Submits the choice
// to the engine and clears the picker state.
function submitPassiveMove(destLane) {
  if (!passiveMoveState) return;
  const { instanceId, seat } = passiveMoveState;
  passiveMoveState = null;
  engineAction(eng => eng.resolvePassiveMove(instanceId, destLane));
}

function moveUnit(seat, fromLane, instanceId, toLane) {
  if (!isMine(seat)) return;
  const eng = ensureEngine();
  if (!eng) return;
  const found = findUnit(game, instanceId);
  if (!found) return;
  // Keep detailState pointing at fromLane (not toLane) while the engine runs:
  // if the move is blocked (cannot_be_moved, lane full, etc.), the engine
  // emits move_blocked without throwing, so engineAction still fires
  // scheduleSave() and render() — but the unit is still in fromLane. Pre-
  // assigning toLane would paint the detail panel in the wrong lane, making
  // subsequent "Defeat" / action clicks target a ghost location.
  detailState = { seat, lane: fromLane, instanceId };
  engineAction(e => {
    e.runOp({ op: "move", target: "self", destination: toLane },
      { actorUnit: found.unit, actorSeat: seat, actorLane: fromLane, targets: {} });
  });
  // After the engine action, re-resolve the unit's actual lane so the detail
  // panel follows it whether or not the move was blocked.
  const afterMove = findUnit(game, instanceId);
  if (afterMove) detailState = { seat, lane: afterMove.lane, instanceId };
}

function defeatUnit(seat, lane, instanceId) {
  // Manual override button: routes through the engine's defeatUnit so
  // graveyard/on-defeat passives fire consistently.
  if (!isMine(seat)) return;
  // Only clear detailState if the unit is actually still on the board —
  // a stale detailState (from a failed or blocked move) might have drifted
  // to a wrong lane; clearing it only when the defeat actually fires prevents
  // the panel from going blank for a unit that wasn't defeated.
  const stillThere = findUnit(game, instanceId);
  if (!stillThere) return; // already gone, nothing to do
  detailState = null;
  engineAction(eng => eng.defeatUnit(instanceId, null));
}

// Manual correction only — energy now resets to BASE_ENERGY automatically
// every turn (see engine startTurn()), so these are for honor-system edge
// cases only (e.g. "we agreed to refund 2 energy for some out-of-table
// reason"), surfaced behind the ⚙ toggle in the energy pill rather than as
// the primary way to manage energy.
function adjustEnergy(seat, delta) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  p.energy = Math.max(0, p.energy + delta);
  scheduleSave();
}

function setEnergy(seat, value) {
  if (!isMine(seat)) return;
  const p = game.players[seat];
  p.energy = Math.max(0, value);
  scheduleSave();
}

function endTurn(seat) {
  if (!isMine(seat)) return;
  playSfx("turn");
  if (game.currentTurn !== seat) return;
  if (game.clockRunning && game.lastTickAt) {
    const elapsed = Date.now() - game.lastTickAt;
    game.clockMs[seat] = Math.max(0, game.clockMs[seat] - elapsed);
  }
  game.lastTickAt = Date.now();
  const eng = ensureEngine();
  engineAction(e => e.endTurn(seat)); // engine flips currentTurn AND fires turn-boundary passives/pending effects
}

function resetMatch() {
  if (!confirm("Start a brand new match? This clears the board for both players.")) return;
  game = freshGameState();
  engine = null; // force re-wrap on the new object
  scheduleSave();
}
// ---------------- Generic correction actions ----------------
// Honor-system games occasionally need a move that isn't tied to any one
// card's kit (e.g. "we agreed this unit should take 1 damage for some
// out-of-table reason"). Rather than scalar pokes that bypass the engine
// (the old adjustHp/adjustDmgBoost/overHp/disabled-toggle model), these
// route through the SAME op interpreter as real card actions — so a manual
// heal still respects max HP, a manual disable still creates a real
// disable_actions status with a real expiry, etc. Free (no energy cost,
// no action-economy interaction) since they're corrections, not plays.

function genericHeal(seat, instanceId, amount) {
  if (!isMine(seat)) return;
  const eng = ensureEngine();
  if (!eng) return;
  const found = findUnit(game, instanceId);
  if (!found) return;
  engineAction(e => {
    e.runOp({ op: "heal", amount: amount, target: "self" },
      { actorUnit: found.unit, actorSeat: seat, actorLane: found.lane, targets: {} });
  });
}

function genericDamage(seat, instanceId, amount) {
  if (!isMine(seat)) return;
  const eng = ensureEngine();
  if (!eng) return;
  const found = findUnit(game, instanceId);
  if (!found) return;
  engineAction(e => {
    // isSelfDamage so it bypasses redirect/reflect/immunity machinery —
    // a manual correction shouldn't trigger Astaroth's reflect, etc.
    e.applyDamage(found.unit, amount, null, null, { multiTarget: false, isSelfDamage: true });
  });
}

function genericDisableToggle(seat, instanceId) {
  if (!isMine(seat)) return;
  const eng = ensureEngine();
  if (!eng) return;
  const found = findUnit(game, instanceId);
  if (!found) return;
  const already = hasStatus(found.unit, "disable_actions");
  engineAction(e => {
    if (already) {
      found.unit.statuses = found.unit.statuses.filter(s => s.kind !== "disable_actions");
    } else {
      addStatus(found.unit, { kind: "disable_actions", expires: { type: "until_next_turn", ownerSeatAtApply: seat } });
    }
  });
}

function genericBuffDamage(seat, instanceId, amount) {
  if (!isMine(seat)) return;
  const eng = ensureEngine();
  if (!eng) return;
  const found = findUnit(game, instanceId);
  if (!found) return;
  engineAction(e => {
    e.runOp({ op: "buff_damage", amount: amount, target: "self", duration: "next_attack", stacks: true },
      { actorUnit: found.unit, actorSeat: seat, actorLane: found.lane, targets: {} });
  });
}
// ---------------- Action target collection ----------------
// Drives the "click an action -> collect whatever it needs -> resolve" flow.
// actionTargetState holds an in-progress action while the UI gathers input:
//   { seat, instanceId, actionIndex, action, needs: [...], collected: {} }
// `needs` is computed once up front by inspecting the action's effect list,
// so the UI knows exactly what to prompt for next without re-deriving it on
// every click.
let actionTargetState = null;
let passiveMoveState = null; // { instanceId, cardName, seat, currentLane } — set when Maxine's passive needs a lane choice
let winDismissedFor = null;  // key of the win condition the player already dismissed; prevents re-pop on every render

// Returns picker needs for a card's on_place passive (e.g. Venia's two
// forced defeats). These are collected before the summon fires, then passed
// as opts.passiveTargets into summonFromHand so the engine can forward them.
// Needs are only added when there are actually valid targets on the board —
// if the board is empty on that side, the picker is skipped entirely so
// the summon can still proceed (Venia is playable as first/last card).
function computeOnPlaceNeeds(cardName, forSeat) {
  const cdef = cardDef(cardName);
  if (!cdef || !cdef.passiveData || cdef.passiveData.trigger !== "on_place") return [];
  const oppSeat = forSeat === "1" ? "2" : "1";
  const LANE_NAMES = ["Left","Center","Right"];

  function hasEnemies() {
    return LANE_NAMES.some(l => game.players[oppSeat]["board"+l].length > 0);
  }
  function hasAllies() {
    // Allies excluding the card being summoned (it's not on the board yet)
    return LANE_NAMES.some(l => game.players[forSeat]["board"+l].length > 0);
  }

  const needs = [];
  const seenKinds = new Set();
  function add(kind, extra) {
    if (seenKinds.has(kind)) return;
    seenKinds.add(kind);
    needs.push(Object.assign({ kind }, extra || {}));
  }
  for (const eff of cdef.passiveData.effects || []) {
    if (eff.target === "single_enemy_choice_any_lane" && hasEnemies()) add("enemyChoiceAnyLane");
    if (eff.target === "single_ally_choice_any_lane" && hasAllies())   add("allyChoiceAnyLane");
    if (eff.target === "single_enemy" && hasEnemies())  add("singleTarget", { allow: "enemy" });
    if (eff.target === "single_any"   && hasEnemies())  add("singleTarget", { allow: "enemy" });
  }
  return needs;
}

// Inspects an action definition and returns an ordered list of "needs" —
// each one describes a single piece of input the UI must collect before the
// action can be resolved. Most actions need nothing (target resolves
// automatically from board state); this only returns entries for effects
// that embed a genuine player choice.
function computeActionNeeds(actorSeat, actorLane, action) {
  const needs = [];
  const seenKinds = new Set();
  function add(kind, extra) {
    if (seenKinds.has(kind)) return; // de-dupe: e.g. two effects both wanting singleTarget
    seenKinds.add(kind);
    needs.push(Object.assign({ kind }, extra || {}));
  }
  // Scan an effect (and its nested sub-effects for gate ops) for player-input needs.
  function scanEff(eff) {
    const t = eff.target;
    if (t === "single_enemy" || t === "single_any") add("singleTarget", { allow: "enemy" });
    if (t === "single_ally") add("singleTarget", { allow: "ally" });
    if (t === "single_enemy_choice_any_lane") add("enemyChoiceAnyLane");
    if (t === "single_ally_choice_any_lane") add("allyChoiceAnyLane");
    if (t === "single_enemy_choice") add("singleTarget", { allow: "enemy" });
    if (t && t.indexOf("card_choice:") === 0) add("cardChoiceInstanceId", { pairNames: t.slice(12).split("_or_") });
    if (eff.destination === "choice") add("destination");
    if (t === "opposing_lane_choice") add("lane");
    if (eff.op === "copy_ability") { add("copySourceInstanceId"); add("copyActionIndex"); add("singleTarget", { allow: "any", optionalFollowUp: true }); }
    if (eff.op === "steal_card") add("stealCardIndex");
    if (eff.op === "modify_summon_cost") add("handCardChoice");
    if (eff.op === "summon_free") { add("summonCardChoice"); add("summonLaneChoice"); }
    if (eff.op === "view_hand" && action.effects.some(e => e.op === "modify_summon_cost")) { /* covered above */ }
    // Recurse into nested effect lists (once_per_turn_gate, conditional, etc.)
    if (eff.effects) eff.effects.forEach(scanEff);
    if (eff.then) eff.then.forEach(scanEff);
    if (eff.else) eff.else.forEach(scanEff);
    if (eff.onHeads) eff.onHeads.forEach(scanEff);
    if (eff.onTails) eff.onTails.forEach(scanEff);
    if (eff.onResult) scanEff(eff.onResult);
  }
  for (const eff of action.effects || []) {
    scanEff(eff);
  }
  return needs;
}

function beginAction(seat, instanceId, actionIndex) {
  if (!isMine(seat)) return;
  const found = findUnit(game, instanceId);
  if (!found) return;
  const def = cardDef(found.unit.name);
  if (!def || !def.actionsData) return;
  const eng = ensureEngine();
  const action = eng.lookupAction(eng.cardDef(found.unit.name), found.unit, actionIndex);
  if (!action) { errorMsg = "That action isn't available right now."; render(); return; }
  const needs = computeActionNeeds(seat, found.lane, action);
  if (needs.length === 0) {
    // Nothing to collect — resolve immediately.
    resolveCardAction(seat, instanceId, actionIndex, {});
    return;
  }
  actionTargetState = { seat, instanceId, actionIndex, action, needs, needIndex: 0, collected: {} };
  render();
}

function cancelAction() {
  actionTargetState = null;
  render();
}

// Called when the player clicks a board unit while an action is awaiting a
// singleTarget/enemyChoiceAnyLane/allyChoiceAnyLane pick.
function provideTargetUnit(clickedSeat, clickedLane, clickedInstanceId) {
  if (!actionTargetState) return;
  const need = actionTargetState.needs[actionTargetState.needIndex];
  if (!need) return;
  const { seat } = actionTargetState;
  const oppSeat = seat === "1" ? "2" : "1";
  if (need.kind === "singleTarget") {
    if (need.allow === "enemy" && clickedSeat !== oppSeat) return;
    if (need.allow === "ally" && clickedSeat !== seat) return;
    actionTargetState.collected.singleTarget = clickedInstanceId;
  } else if (need.kind === "enemyChoiceAnyLane") {
    if (clickedSeat !== oppSeat) return;
    actionTargetState.collected.enemyChoiceAnyLane = clickedInstanceId;
  } else if (need.kind === "allyChoiceAnyLane") {
    if (clickedSeat !== seat) return;
    actionTargetState.collected.allyChoiceAnyLane = clickedInstanceId;
  } else if (need.kind === "copySourceInstanceId") {
    if (clickedSeat !== seat) return;
    actionTargetState.collected.copySourceInstanceId = clickedInstanceId;
    // immediately follow up with which of that ally's 3 actions to copy
    advanceNeedIndexOrPromptActionPick(clickedSeat, clickedLane, clickedInstanceId);
    return;
  } else if (need.kind === "cardChoiceInstanceId") {
    const found = findUnit(game, clickedInstanceId);
    if (!found || found.seat !== seat) return;
    if (need.pairNames.indexOf(found.unit.name) < 0) return;
    actionTargetState.collected.cardChoiceInstanceId = clickedInstanceId;
  } else {
    return;
  }
  advanceTargetCollection();
}

function advanceNeedIndexOrPromptActionPick(seat, lane, allyInstanceId) {
  // After picking WHICH ally to copy, immediately render a small inline
  // picker for which of their 3 actions to copy (handled by the detail
  // panel — see copyAbilityActionPickHtml).
  actionTargetState.pendingCopySource = allyInstanceId;
  render();
}

function provideCopyActionIndex(idx) {
  if (!actionTargetState) return;
  actionTargetState.collected.copyActionIndex = idx;
  actionTargetState.pendingCopySource = null;
  advanceTargetCollection();
}

function provideLane(lane) {
  if (!actionTargetState) return;
  const need = actionTargetState.needs[actionTargetState.needIndex];
  if (!need) return;
  if (need.kind === "lane") actionTargetState.collected.lane = lane;
  else if (need.kind === "destination") actionTargetState.collected.destination = lane;
  else return;
  advanceTargetCollection();
}

function provideStealCardIndex(idx) {
  if (!actionTargetState) return;
  actionTargetState.collected.stealCardIndex = idx;
  advanceTargetCollection();
}

function provideHandCardChoice(name) {
  if (!actionTargetState) return;
  actionTargetState.collected.handCardChoice = name;
  advanceTargetCollection();
}

function provideSummonCardChoice(name) {
  if (!actionTargetState) return;
  const need = actionTargetState.needs[actionTargetState.needIndex];
  if (!need || need.kind !== "summonCardChoice") return;
  actionTargetState.collected.summonCardChoice = name;
  advanceTargetCollection();
}

function provideSummonLaneChoice(lane) {
  if (!actionTargetState) return;
  const need = actionTargetState.needs[actionTargetState.needIndex];
  if (!need || need.kind !== "summonLaneChoice") return;
  actionTargetState.collected.summonLaneChoice = lane;
  advanceTargetCollection();
}

function advanceTargetCollection() {
  if (!actionTargetState) return;
  actionTargetState.needIndex++;
  if (actionTargetState.needIndex >= actionTargetState.needs.length) {
    const { seat, instanceId, actionIndex, collected, onComplete } = actionTargetState;
    actionTargetState = null;
    if (onComplete) {
      // Custom resolve path (e.g. Venia on-place picker before summon)
      onComplete(collected);
    } else {
      resolveCardAction(seat, instanceId, actionIndex, collected);
    }
    return;
  }
  render();
}

// Returns each player's remaining clock time in ms, accounting for time
// elapsed since the last save if their clock is currently running. Both
// clients derive this independently from the same lastTickAt timestamp
// rather than running a local countdown, so they stay in sync without
// needing a server-side timer.
function liveClockMs() {
  const base = { "1": game.clockMs["1"], "2": game.clockMs["2"] };
  if (game.clockRunning && game.lastTickAt) {
    const elapsed = Date.now() - game.lastTickAt;
    base[game.currentTurn] = Math.max(0, base[game.currentTurn] - elapsed);
  }
  return base;
}

// ---------------- Rendering ----------------
function render() {
  if (!game) { app.innerHTML = `<div class="loading">Loading...</div>`; return; }

  // Fresh cache for this render pass — see getContinuousStateCached() above.
  continuousStateCache.clear();

  if (mySeat === null) {
    renderSeatSelect();
    return;
  }

  // If there's no modal to show, make sure none is left over from before.
  // (When a modal IS open, renderModal() below updates it in place rather
  // than recreating it — see the comment there for why that matters.)
  if (!modalState) {
    document.querySelectorAll(".modal-backdrop").forEach(el => el.remove());
  }

  try {
    if (game.phase === "setup") {
      renderSetup();
    } else {
      renderBoard();
    }

    if (modalState) {
      renderModal();
    }
  } catch (e) {
    console.error("Render error:", e);
    boardMountedForSeat = null;
    app.innerHTML = `
      <div class="errorMsg" style="margin-top:2rem">
        Something went wrong rendering the board (likely a leftover save from an older version).
        <br><br>
        <button id="hardResetBtn" class="danger">Reset this match and start fresh</button>
      </div>`;
    const btn = document.getElementById("hardResetBtn");
    if (btn) btn.onclick = () => { game = freshGameState(); scheduleSave(); };
  }
}

function renderSeatSelect() {
  app.innerHTML = `
    <div class="select-screen">
      <p class="title">✦ Hilastone ✦</p>
      <p class="sub">Pick your seat for match "<strong>${escapeHtml(matchId)}</strong>"</p>
      <div class="seat-btns">
        <button class="seat-btn primary" id="seat1">Player 1<span class="seat-sub">${game.players["1"].handLocked ? "Hand locked" : "Building hand"}</span></button>
        <button class="seat-btn primary" id="seat2">Player 2<span class="seat-sub">${game.players["2"].handLocked ? "Hand locked" : "Building hand"}</span></button>
      </div>
      <p style="margin-top:24px;font-size:12px;color:var(--text-tertiary)">Share this link with your opponent so they can join as the other seat. Each seat only sees its own hand.</p>
    </div>
  `;
  document.getElementById("seat1").onclick = () => pickSeat(1);
  document.getElementById("seat2").onclick = () => pickSeat(2);
}

function pickSeat(n) {
  mySeat = n;
  sessionStorage.setItem("hilastone-seat-" + matchId, String(n));
  startPolling();
  render();
}

// Tracks whether the setup screen's skeleton is already mounted for the
// current seat/lock-state, so picking cards only patches the pool grid's
// selection classes and the hand-strip/counter — not the whole page. A full
// app.innerHTML rewrite on every tap was resetting scroll position on
// mobile (the browser can't preserve scroll across a full node swap),
// making it look like the page "popped back up" before you could finish
// picking. Same root cause as the board image-redecode stutter, just here
// it shows up as a scroll reset instead.
let setupMountedKey = null;

function renderSetup() {
  const seat = String(mySeat);
  const p = game.players[seat];
  const oppSeat = seat === "1" ? "2" : "1";
  const opp = game.players[oppSeat];

  // The skeleton differs structurally between "hand locked" and "still
  // picking", and between manual/random mode — remount whenever any of
  // those change, but NOT on every single card pick within manual mode.
  const mountKey = seat + "|" + p.handLocked + "|" + setupPickMode + "|" + bothLocked();

  if (setupMountedKey !== mountKey || !document.getElementById("setupRoot")) {
    mountSetupSkeleton(seat, p, opp);
    setupMountedKey = mountKey;
  }

  const errBox = document.getElementById("setupErrorBox");
  if (errBox) errBox.innerHTML = errorMsg ? `<div class="errorMsg">${errorMsg}</div>` : "";

  if (p.handLocked) {
    const handStrip = document.getElementById("lockedHandStrip");
    if (handStrip) handStrip.innerHTML = p.hand.map(n => miniCardHtml(n)).join("");
    return;
  }

  // Still picking: patch the parts that change with each tap — the
  // counter text, the selected-cards strip, the lock button's
  // enabled/disabled state, and each pool card's selected/disabled class —
  // without touching the grid's DOM nodes themselves (so their <img>
  // elements are never redecoded and the page never re-flows/scrolls).
  const lead = document.getElementById("setupLead");
  if (lead) lead.textContent = `Pick exactly ${HAND_SIZE} characters from the pool, or draw randomly. (${p.pool.length}/${HAND_SIZE} selected)`;

  const handStrip = document.getElementById("pickHandStrip");
  if (handStrip) {
    handStrip.innerHTML = p.pool.length === 0 ? `<div class="empty-hint">No cards selected yet</div>` : p.pool.map(n => `
      <div class="mini-card"><img src="${getCardImage(n)}" alt="${n}"><button data-remove="${escapeHtml(n)}">×</button></div>
    `).join("");
    document.querySelectorAll("[data-remove]").forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); togglePoolPick(seat, el.dataset.remove); };
    });
  }

  document.querySelectorAll("[data-pick]").forEach(el => {
    const name = el.dataset.pick;
    const selected = p.pool.includes(name);
    const disabled = !selected && p.pool.length >= HAND_SIZE;
    el.classList.toggle("selected", selected);
    el.classList.toggle("disabled", disabled);
  });

  const lockBtn = document.getElementById("lockBtn");
  if (lockBtn) {
    lockBtn.textContent = `Lock In Hand (${p.pool.length}/${HAND_SIZE})`;
    lockBtn.disabled = p.pool.length !== HAND_SIZE;
  }
}

function mountSetupSkeleton(seat, p, opp) {
  let body = "";
  if (p.handLocked) {
    body = `
      <div class="setup-card panel">
        <h2>Hand locked in ✓</h2>
        <p class="lead">Waiting on ${opp.handLocked ? "the match to start" : "Player " + (seat === "1" ? "2" : "1") + " to finish their hand"}.</p>
        <div class="hand-strip" id="lockedHandStrip">${p.hand.map(n => miniCardHtml(n)).join("")}</div>
        <button class="ghost" id="unlockBtn">Edit hand</button>
      </div>
    `;
    if (bothLocked()) {
      body += `<div class="setup-card panel" style="text-align:center">
        <button class="primary" id="startBtn" style="width:100%;padding:14px;font-size:15px">▶ Start Match</button>
        <button class="ghost" id="resetBtn" style="width:100%;margin-top:8px;font-size:12px;opacity:0.6">Reset match (start over)</button>
      </div>`;
    }
  } else {
    body = `
      <div class="setup-card panel">
        <h2>Build your hand</h2>
        <p class="lead" id="setupLead">Pick exactly ${HAND_SIZE} characters from the pool, or draw randomly. (${p.pool.length}/${HAND_SIZE} selected)</p>
        <div class="mode-toggle">
          <button id="modeManual" class="${setupPickMode === "manual" ? "active" : ""}">Pick manually</button>
          <button id="modeRandom" class="${setupPickMode === "random" ? "active" : ""}">Random draw</button>
        </div>
        ${setupPickMode === "random" ? `<button class="ghost" id="rerollBtn" style="width:100%;margin-bottom:12px">🎲 Draw ${HAND_SIZE} random cards</button>` : ""}
        <div class="hand-strip" id="pickHandStrip">
          ${p.pool.length === 0 ? `<div class="empty-hint">No cards selected yet</div>` : p.pool.map(n => `
            <div class="mini-card"><img src="${getCardImage(n)}" alt="${n}"><button data-remove="${escapeHtml(n)}">×</button></div>
          `).join("")}
        </div>
        <div class="pool-grid">
          ${CARDS.filter(c => !c.dlc).map(c => `
            <div class="pool-card ${p.pool.includes(c.name) ? "selected" : ""} ${!p.pool.includes(c.name) && p.pool.length >= HAND_SIZE ? "disabled" : ""}" data-pick="${escapeHtml(c.name)}">
              <img src="${getCardImage(c.name)}" alt="${c.name}">
              <div class="pc-cost">${c.cost}⚡</div>
              <div class="pc-name">${c.name}</div>
            </div>
          `).join("")}
        </div>
        ${CARDS.some(c => c.dlc) ? `
        <div class="dlc-divider"><span>✦ Special Characters ✦</span></div>
        <div class="pool-grid">
          ${CARDS.filter(c => c.dlc).map(c => `
            <div class="pool-card dlc-card ${p.pool.includes(c.name) ? "selected" : ""} ${!p.pool.includes(c.name) && p.pool.length >= HAND_SIZE ? "disabled" : ""}" data-pick="${escapeHtml(c.name)}">
              <img src="${getCardImage(c.name)}" alt="${c.name}">
              <div class="pc-cost">${c.cost}⚡</div>
              <div class="pc-name">${c.name}</div>
              <div class="pc-dlc-tag">DLC</div>
            </div>
          `).join("")}
        </div>
        ` : ""}
        <button class="primary" id="lockBtn" style="width:100%;padding:12px" ${p.pool.length !== HAND_SIZE ? "disabled" : ""}>Lock In Hand (${p.pool.length}/${HAND_SIZE})</button>
      </div>
    `;
  }

  app.innerHTML = `
    <div id="setupRoot">
      <div class="topbar">
        <h1>Hilastone</h1>
        <div class="topbar-right"><span class="badge">You are Player ${seat}</span></div>
      </div>
      <div id="setupErrorBox">${errorMsg ? `<div class="errorMsg">${errorMsg}</div>` : ""}</div>
      <div class="setup-screen">${body}</div>
    </div>
  `;

  if (p.handLocked) {
    document.getElementById("unlockBtn").onclick = () => unlockHand(seat);
    if (bothLocked()) {
      document.getElementById("startBtn").onclick = startMatch;
      document.getElementById("resetBtn").onclick = () => {
        if (confirm("Reset the match and start over from scratch?")) {
          game = freshGameState();
          scheduleSave();
          render();
        }
      };
    }
  } else {
    document.getElementById("modeManual").onclick = () => { setupPickMode = "manual"; render(); };
    document.getElementById("modeRandom").onclick = () => { setupPickMode = "random"; render(); };
    const reroll = document.getElementById("rerollBtn");
    if (reroll) reroll.onclick = () => buildRandomPool(seat);
    document.querySelectorAll("[data-pick]").forEach(el => {
      el.onclick = () => togglePoolPick(seat, el.dataset.pick);
    });
    document.querySelectorAll("[data-remove]").forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); togglePoolPick(seat, el.dataset.remove); };
    });
    document.getElementById("lockBtn").onclick = () => lockHand(seat);
  }
}

function miniCardHtml(name) {
  return `<div class="mini-card"><img src="${getCardImage(name)}" alt="${name}"></div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

// Track whether the board skeleton (the outer DOM shell) is already mounted
// for the current seat, so repeated renders only patch the specific sections
// that changed instead of reassigning innerHTML for the whole board. Every
// card image is an inline base64 data URI — reassigning innerHTML forces the
// browser to redecode every visible image on every click, which is the main
// cause of stutter/rubberbanding. Patching only changed sections keeps
// unrelated <img> nodes untouched so they're never redecoded.
let boardMountedForSeat = null;

// Caches the last-rendered HTML string for each of the 6 lane slots
// (seat|lane), so renderBoard() can skip reassigning a lane's innerHTML
// entirely when nothing in it actually changed — see the lane-rendering
// block in renderBoard() for why this matters. Cleared whenever the board
// skeleton is remounted (new seat, new match, lost DOM) so a fresh mount
// always writes real content instead of incorrectly comparing against
// stale strings from a previous mount.
let laneHtmlCache = new Map();

// Returns { winner: "1"|"2", reason: string } if the game is over, else null.
// Called on every render so either client shows the popup as soon as conditions are met.
function checkWinCondition() {
  if (!game || game.phase !== "playing") return null;
  const clocks = liveClockMs();
  // Clock timeout: player whose time ran out loses
  for (const s of ["1", "2"]) {
    if (clocks[s] <= 0) {
      return { winner: s === "1" ? "2" : "1", reason: "Player " + s + "'s time ran out" };
    }
  }
  // No-cards rule: a player with no hand cards AND no units on the board loses
  for (const s of ["1", "2"]) {
    const p = game.players[s];
    const hasUnits = ["Left","Center","Right"].some(l => p["board"+l].length > 0);
    const hasHand = p.hand.length > 0;
    if (!hasUnits && !hasHand) {
      return { winner: s === "1" ? "2" : "1", reason: "Player " + s + " has no cards left" };
    }
  }
  return null;
}

function renderBoard() {
  const seat = String(mySeat);
  const oppSeat = seat === "1" ? "2" : "1";
  const p1 = game.players["1"];
  const p2 = game.players["2"];
  const me = game.players[seat];
  const opp = game.players[oppSeat];

  if (boardMountedForSeat !== seat || !document.getElementById("boardSkeleton")) {
    laneHtmlCache.clear();
    mountBoardSkeleton(seat);
    boardMountedForSeat = seat;
  }

  // Passive move picker — shown to Maxine's owner after she's attacked
  {
    let pmOverlay = document.getElementById("passiveMoveOverlay");
    if (passiveMoveState && String(mySeat) === String(passiveMoveState.seat)) {
      if (!pmOverlay) {
        pmOverlay = document.createElement("div");
        pmOverlay.id = "passiveMoveOverlay";
        pmOverlay.className = "win-overlay"; // reuse the dim + center style
        document.body.appendChild(pmOverlay);
      }
      const { cardName, currentLane } = passiveMoveState;
      const laneOptions = ["Left","Center","Right"].filter(l => l !== currentLane);
      pmOverlay.innerHTML = `
        <div class="win-card">
          <div class="win-title" style="font-size:18px;color:var(--accent)">${escapeHtml(cardName)} was attacked!</div>
          <div class="win-reason">Choose a lane to move to:</div>
          <div style="display:flex;gap:10px;justify-content:center">
            ${laneOptions.map(l => `<button class="primary" style="flex:1" onclick="submitPassiveMove('${l}')">${l}</button>`).join("")}
          </div>
        </div>`;
    } else if (pmOverlay) {
      pmOverlay.remove();
    }
  }

  // Win condition overlay — shown once when the condition is first met.
  // Dismissed state is tracked in winDismissedFor so it doesn't re-appear
  // on every subsequent render() call.
  {
    const win = checkWinCondition();
    let overlay = document.getElementById("winOverlay");
    if (win && winDismissedFor !== (win.winner + win.reason)) {
      if (!overlay) {
        overlay = document.createElement("div");
        overlay.id = "winOverlay";
        overlay.className = "win-overlay";
        document.body.appendChild(overlay);
      }
      const isMe = String(mySeat) === win.winner;
      overlay.innerHTML = `
        <div class="win-card">
          <div class="win-title">${isMe ? "🏆 You Win!" : "💀 You Lose"}</div>
          <div class="win-reason">Player ${win.winner} wins — ${win.reason}</div>
          <button class="primary" onclick="winDismissedFor='${win.winner + win.reason}';document.getElementById('winOverlay').remove()">Dismiss</button>
        </div>`;
    } else if (overlay) {
      overlay.remove();
      winDismissedFor = null;
    }
  }

  // Error banner
  const errBox = document.getElementById("errorBox");
  if (errBox) errBox.innerHTML = errorMsg ? `<div class="errorMsg">${errorMsg}</div>` : "";

  // RNG result toast (coin flips, dice rolls) — auto-clears itself via
  // showRngToast's timer, which calls render() again when it expires.
  const rngBox = document.getElementById("rngToastBox");
  if (rngBox) rngBox.innerHTML = rngToast ? `<div class="rngToast">${rngToast.text}</div>` : "";

  // Turn bar: whose turn it is + per-player chess clocks.
  // The clockTickTimer already repaints this every second for the countdown —
  // here we only need to rebind the End Turn button and force a repaint when
  // structural state changes (current turn, clockRunning). The key omits ms
  // so we don't redundantly repaint on every render() during a running clock.
  const turnBar = document.getElementById("turnBar");
  if (turnBar) {
    const turnKey = game.currentTurn + "|" + game.clockRunning + "|" + game.turnNumber;
    if (turnBar.dataset.cacheKey !== turnKey || !document.getElementById("endTurnBtn")) {
      turnBar.innerHTML = turnBarHtml(seat);
      turnBar.dataset.cacheKey = turnKey;
      const endTurnBtn = document.getElementById("endTurnBtn");
      if (endTurnBtn) endTurnBtn.onclick = () => endTurn(seat);
    }
  }

  // Energy pills — only rebuild when energy values actually changed
  const energyRow = document.getElementById("energyRow");
  if (energyRow) {
    const energyKey = p1.energy + "|" + p2.energy + "|" + (energyCorrectionOpen || "");
    if (energyRow.dataset.cacheKey !== energyKey) {
      energyRow.innerHTML = energyPillHtml("1", p1) + energyPillHtml("2", p2);
      energyRow.dataset.cacheKey = energyKey;
      bindEnergyRowEvents();
    }
  }

  // Board lanes (only this section contains the many per-unit card images).
  // Each of the 6 lane slots (3 lanes x 2 seats) gets its own stable
  // sub-container and is only reassigned if its rendered HTML actually
  // changed since the last render — reassigning innerHTML forces the
  // browser to redecode every <img> inside it, which is the single biggest
  // cause of stutter on a full board. Most renders only change ONE lane
  // (e.g. a single attack), so this turns "redecode up to 24 images every
  // 2.5s poll" into "redecode 0-4 images, only for the lane that changed."
  const lanesP1 = document.getElementById("lanesP1");
  const lanesP2 = document.getElementById("lanesP2");
  if (lanesP1 && lanesP2) {
    if (!lanesP1.querySelector(".lane-slot")) {
      // First mount: build all 6 stable containers once.
      lanesP1.innerHTML = LANES.map(lane => `<div class="lane-slot" data-laneslot="1|${lane}"></div>`).join("");
      lanesP2.innerHTML = LANES.map(lane => `<div class="lane-slot" data-laneslot="2|${lane}"></div>`).join("");
    }
    let anyLaneChanged = false;
    for (const seat of ["1", "2"]) {
      const container = seat === "1" ? lanesP1 : lanesP2;
      for (const lane of LANES) {
        const slot = container.querySelector(`[data-laneslot="${seat}|${lane}"]`);
        if (!slot) continue;
        const html = laneHtml(seat, lane);
        const cacheKey = seat + "|" + lane;
        if (laneHtmlCache.get(cacheKey) === html) continue; // unchanged -> skip, no redecode
        laneHtmlCache.set(cacheKey, html);
        slot.innerHTML = html;
        anyLaneChanged = true;
      }
    }
    if (anyLaneChanged) bindLaneEvents();
  }

  // Hand — diff-cached to avoid redecoding images on every poll/render
  const handHead = document.getElementById("myHandHead");
  if (handHead) handHead.innerHTML = `<h2>Your Hand (${me.hand.length})</h2>`;
  const handCards = document.getElementById("myHandCards");
  if (handCards) {
    const myHandHtml = me.hand.length === 0 ? `<div class="empty-hint">Empty</div>` : me.hand.map(name => {
      const c = cardDef(name);
      return `<div class="hand-card" data-handcard="${escapeHtml(name)}"><img src="${getCardImage(name)}" alt="${name}"><div class="hc-name">${name}</div><div class="hc-cost">${c.cost}⚡</div></div>`;
    }).join("");
    if (handCards.dataset.cachedHtml !== myHandHtml) {
      handCards.innerHTML = myHandHtml;
      handCards.dataset.cachedHtml = myHandHtml;
      bindHandCardEvents(seat);
    }
  }
  const oppHandHead = document.getElementById("oppHandHead");
  if (oppHandHead) oppHandHead.innerHTML = `<h2 style="font-size:13px;color:var(--text-tertiary)">Opponent's Hand (${opp.hand.length} cards)</h2>`;
  const oppHandCards = document.getElementById("oppHandCards");
  if (oppHandCards) {
    const oppHandHtml = opp.hand.length === 0 ? `<div class="empty-hint">Empty</div>` : opp.hand.map(() => `<div class="hand-back">🂠</div>`).join("");
    if (oppHandCards.dataset.cachedHtml !== oppHandHtml) {
      oppHandCards.innerHTML = oppHandHtml;
      oppHandCards.dataset.cachedHtml = oppHandHtml;
    }
  }

  // Graveyard — diff-cached (has images, re-binding is also expensive)
  const gyP1 = document.getElementById("gyP1");
  const gyP2 = document.getElementById("gyP2");
  let gyChanged = false;
  if (gyP1) {
    document.getElementById("gyP1Label").textContent = `Player 1 (${p1.graveyard.length})`;
    const gyHtml1 = p1.graveyard.map((n, i) => `<div class="gy-card" data-gycard="1|${i}" title="View ${escapeHtml(n)}"><img src="${getCardImage(n)}" alt="${n}"></div>`).join("") || `<div class="empty-hint">—</div>`;
    if (gyP1.dataset.cachedHtml !== gyHtml1) { gyP1.innerHTML = gyHtml1; gyP1.dataset.cachedHtml = gyHtml1; gyChanged = true; }
  }
  if (gyP2) {
    document.getElementById("gyP2Label").textContent = `Player 2 (${p2.graveyard.length})`;
    const gyHtml2 = p2.graveyard.map((n, i) => `<div class="gy-card" data-gycard="2|${i}" title="View ${escapeHtml(n)}"><img src="${getCardImage(n)}" alt="${n}"></div>`).join("") || `<div class="empty-hint">—</div>`;
    if (gyP2.dataset.cachedHtml !== gyHtml2) { gyP2.innerHTML = gyHtml2; gyP2.dataset.cachedHtml = gyHtml2; gyChanged = true; }
  }
  if (gyChanged) {
    document.querySelectorAll("[data-gycard]").forEach(el => {
      el.onclick = () => {
        const [s, idx] = el.dataset.gycard.split("|");
        const name = game.players[s].graveyard[Number(idx)];
        if (!name) return;
        modalState = { type: "viewCard", name, seat: s, graveyardIndex: Number(idx) };
        render();
      };
    });
  }

  // Side detail panel — diff-cached against a key that captures all inputs
  // that would change the rendered output, so the panel isn't rebuilt
  // on every clock tick or unrelated lane update.
  const sideCol = document.getElementById("sideCol");
  if (sideCol) {
    const sideKey = JSON.stringify([
      detailState,
      actionTargetState && { needs: actionTargetState.needs, needIndex: actionTargetState.needIndex, collected: actionTargetState.collected },
      detailState ? (() => { const f = findUnit(game, detailState.instanceId); return f ? { hp: f.unit.hp, statuses: f.unit.statuses, counters: f.unit.counters, flags: f.unit.flags } : null; })() : null,
      game.players["1"].energy, game.players["2"].energy,
    ]);
    if (sideCol.dataset.cacheKey !== sideKey) {
      sideCol.innerHTML = detailPanelHtml();
      sideCol.dataset.cacheKey = sideKey;
      bindDetailPanelEvents();
    }
  }
}

function bindEnergyRowEvents() {
  document.querySelectorAll("[data-energy]").forEach(el => {
    el.onclick = () => {
      const [s, d] = el.dataset.energy.split(",");
      adjustEnergy(s, Number(d));
    };
  });
  document.querySelectorAll("[data-setenergy5]").forEach(el => {
    el.onclick = () => setEnergy(el.dataset.setenergy5, BASE_ENERGY);
  });
  document.querySelectorAll("[data-energycorrect]").forEach(el => {
    el.onclick = () => {
      const s = el.dataset.energycorrect;
      energyCorrectionOpen = energyCorrectionOpen === s ? null : s;
      render();
    };
  });
}

function bindLaneEvents() {
  document.querySelectorAll("[data-unit]").forEach(el => {
    el.onclick = () => {
      const [s, lane, iid] = el.dataset.unit.split("|");
      // If an action is mid-flow awaiting a unit target, route the click
      // there instead of (just) opening the detail panel — this lets the
      // board itself act as the target picker, which is far more natural
      // than a separate dropdown.
      if (actionTargetState) {
        const need = actionTargetState.needs[actionTargetState.needIndex];
        if (need && ["singleTarget", "enemyChoiceAnyLane", "allyChoiceAnyLane", "copySourceInstanceId", "cardChoiceInstanceId"].indexOf(need.kind) >= 0) {
          provideTargetUnit(s, lane, iid);
          return;
        }
      }
      detailState = { seat: s, lane, instanceId: iid };
      render();
    };
  });
  document.querySelectorAll("[data-addunit]").forEach(el => {
    el.onclick = () => {
      const [s, lane] = el.dataset.addunit.split("|");
      if (!isMine(s)) return;
      modalState = { type: "addUnit", seat: s, lane };
      render();
    };
  });
}

function bindHandCardEvents(seat) {
  document.querySelectorAll("[data-handcard]").forEach(el => {
    el.onclick = () => {
      modalState = { type: "summon", seat, name: el.dataset.handcard };
      render();
    };
  });
}

function formatClock(ms) {
  const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function turnBarHtml(seat) {
  const clocks = liveClockMs();
  const active = game.currentTurn;
  const myTurn = active === seat;
  const p1Low = clocks["1"] <= 30000;
  const p2Low = clocks["2"] <= 30000;
  const p1Out = clocks["1"] <= 0;
  const p2Out = clocks["2"] <= 0;
  return `
    <div class="turn-bar-inner">
      <div class="turn-clock ${active === "1" ? "active" : ""} ${p1Out ? "out" : p1Low ? "low" : ""}">
        <span class="tc-label">Player 1</span>
        <span class="tc-time">${formatClock(clocks["1"])}</span>
      </div>
      <div class="turn-status">
        <div class="turn-status-label">${p1Out || p2Out ? "Time's up" : `${active === seat ? "Your" : "Player " + active + "'s"} turn`}</div>
        ${myTurn ? `<button class="primary" id="endTurnBtn">End Turn →</button>` : `<div class="turn-waiting">Waiting on Player ${active}…</div>`}
      </div>
      <div class="turn-clock ${active === "2" ? "active" : ""} ${p2Out ? "out" : p2Low ? "low" : ""}">
        <span class="tc-label">Player 2</span>
        <span class="tc-time">${formatClock(clocks["2"])}</span>
      </div>
    </div>
  `;
}
