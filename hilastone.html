              <div class="gy-row" id="gyP2"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="side-col" id="sideCol"></div>
    </div>
    </div>
  `;
  document.getElementById("resetBtn").onclick = resetMatch;
}

function bindEnergyRowEvents() {
  document.querySelectorAll("[data-energy]").forEach(el => {
    el.onclick = () => {
      const [s, d] = el.dataset.energy.split(",");
      adjustEnergy(s, Number(d));
    };
  });
  document.querySelectorAll("[data-setenergy5]").forEach(el => {
    el.onclick = () => setEnergy(el.dataset.setenergy5, BASE_ENERGY);
  });
  document.querySelectorAll("[data-energycorrect]").forEach(el => {
    el.onclick = () => {
      const s = el.dataset.energycorrect;
      energyCorrectionOpen = energyCorrectionOpen === s ? null : s;
      render();
    };
  });
}

function bindLaneEvents() {
  document.querySelectorAll("[data-unit]").forEach(el => {
    el.onclick = () => {
      const [s, lane, iid] = el.dataset.unit.split("|");
      // If an action is mid-flow awaiting a unit target, route the click
      // there instead of (just) opening the detail panel — this lets the
      // board itself act as the target picker, which is far more natural
      // than a separate dropdown.
      if (actionTargetState) {
        const need = actionTargetState.needs[actionTargetState.needIndex];
        if (need && ["singleTarget", "enemyChoiceAnyLane", "allyChoiceAnyLane", "copySourceInstanceId", "cardChoiceInstanceId"].indexOf(need.kind) >= 0) {
          provideTargetUnit(s, lane, iid);
          return;
        }
      }
      detailState = { seat: s, lane, instanceId: iid };
      render();
    };
  });
  document.querySelectorAll("[data-addunit]").forEach(el => {
    el.onclick = () => {
      const [s, lane] = el.dataset.addunit.split("|");
      if (!isMine(s)) return;
      modalState = { type: "addUnit", seat: s, lane };
      render();
    };
  });
}

function bindHandCardEvents(seat) {
  document.querySelectorAll("[data-handcard]").forEach(el => {
    el.onclick = () => {
      modalState = { type: "summon", seat, name: el.dataset.handcard };
      render();
    };
  });
}

function formatClock(ms) {
  const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function turnBarHtml(seat) {
  const clocks = liveClockMs();
  const active = game.currentTurn;
  const myTurn = active === seat;
  const p1Low = clocks["1"] <= 30000;
  const p2Low = clocks["2"] <= 30000;
  const p1Out = clocks["1"] <= 0;
  const p2Out = clocks["2"] <= 0;
  return `
    <div class="turn-bar-inner">
      <div class="turn-clock ${active === "1" ? "active" : ""} ${p1Out ? "out" : p1Low ? "low" : ""}">
        <span class="tc-label">Player 1</span>
        <span class="tc-time">${formatClock(clocks["1"])}</span>
      </div>
      <div class="turn-status">
        <div class="turn-status-label">${p1Out || p2Out ? "Time's up" : `${active === seat ? "Your" : "Player " + active + "'s"} turn`}</div>
        ${myTurn ? `<button class="primary" id="endTurnBtn">End Turn →</button>` : `<div class="turn-waiting">Waiting on Player ${active}…</div>`}
      </div>
      <div class="turn-clock ${active === "2" ? "active" : ""} ${p2Out ? "out" : p2Low ? "low" : ""}">
        <span class="tc-label">Player 2</span>
        <span class="tc-time">${formatClock(clocks["2"])}</span>
      </div>
    </div>
  `;
}

function energyPillHtml(seat, p) {
  const mine = isMine(seat);
  return `
    <div class="energy-pill panel p${seat} ${mine ? "" : "locked"}">
      <div class="ep-top">
        <div>
          <div class="ep-label">Player ${seat} Energy</div>
          <div class="ep-val">${p.energy}</div>
          ${mine ? `<div class="ep-auto-note">Resets to ${BASE_ENERGY} automatically each turn</div>` : `<div class="ep-lock-note">Controlled by Player ${seat}</div>`}
        </div>
      </div>
    </div>
  `;
}

function laneHtml(seat, lane) {
  const p = game.players[seat];
  const lk = laneKey(lane);
  const units = p[lk];
  const mine = isMine(seat);
  const targeting = actionTargetState && (() => {
    const need = actionTargetState.needs[actionTargetState.needIndex];
    if (!need) return false;
    if (["singleTarget", "enemyChoiceAnyLane", "allyChoiceAnyLane", "copySourceInstanceId", "cardChoiceInstanceId"].indexOf(need.kind) < 0) return false;
    // For copySourceInstanceId (Crumbs passive): only same lane as the actor, own seat, not self
    if (need.kind === "copySourceInstanceId") {
      const actorFound = findUnit(game, actionTargetState.instanceId);
      if (!actorFound || lane !== actorFound.lane || seat !== actionTargetState.seat) return false;
    }
    return true;
  })();
  const slots = [];
  for (let i = 0; i < LANE_CAP; i++) {
    if (units[i]) {
      slots.push(unitCardHtml(seat, lane, units[i], targeting));
    } else if (mine && i === units.length) {
      slots.push(`<button class="add-unit-btn" data-addunit="${seat}|${lane}">+ Summon</button>`);
    } else {
      slots.push(`<div class="lane-empty-slot">·</div>`);
    }
  }
  return `
    <div class="lane">
      <div class="lane-head">
        <span class="lane-name">${lane}</span>
      </div>
      <div class="unit-grid">${slots.join("")}</div>
    </div>
  `;
}

function unitCardHtml(seat, lane, u, targetable) {
  const auto = isAutoResolvable(u.name);
  const cont = auto ? getContinuousStateCached(u) : null;
  const effectiveMaxHp = cont ? u.maxHp + cont.maxHpBonus : u.maxHp;
  const lowHp = u.hp <= Math.ceil(effectiveMaxHp * 0.3);
  const overHeal = Math.max(0, u.hp - effectiveMaxHp);
  const mine = isMine(seat);
  const isSelected = detailState && detailState.instanceId === u.instanceId;
  const disabled = !!(cont && (hasStatus(u, "disable_actions") || cont.disabledByLaneController));
  const dmgBuff = u.statuses && u.statuses.find(s => s.kind === "buff_damage");
  const immune = !!(cont && cont.fullyImmune);
  // Continuous passive damage bonus (Aichmo, Chloe, Orina, Linnaeus, etc.)
  const continuousDmgBonus = cont ? Math.round(cont.damageDealtBonus) : 0;
  const showContinuousBadge = continuousDmgBonus > 0 && !dmgBuff;
  // Damage negate badge — two sources:
  // 1. negate_damage STATUS (Mirette a3: explicit shield, one-shot, stored as status)
  // 2. on_attacked once_per_turn_gate with negate_damage_immediate (Kazura) —
  //    shown when the gate counter hasn't fired yet this turn, meaning she can
  //    still negate. Counter key is flowerBreathing (set in maybeOnAttacked).
  const hasNegateStatus = hasStatus(u, "negate_damage");
  const hasNegateGate = (() => {
    const cdef = cardDef(u.name);
    if (!cdef || !cdef.passiveData || cdef.passiveData.trigger !== "on_attacked") return false;
    const gateEff = (cdef.passiveData.effects || []).find(e => e.op === "once_per_turn_gate" &&
      (e.effects || []).some(sub => sub.op === "negate_damage_immediate"));
    if (!gateEff) return false;
    // Gate not yet used this turn = negate still available
    return !u.counters[gateEff.key || "default"];
  })();
  const hasNegate = hasNegateStatus || hasNegateGate;
  // Tanker mode (Robot / Tank)
  const unitMode = u.flags && u.flags.mode;
  // Copied passive marker (Crumbs)
  const copiedPassiveName = u.flags && u.flags.copiedPassiveName;
  // reflect_next_hit badge
  const hasReflect = hasStatus(u, "reflect_next_hit");
  return `
    <div class="unit-card ${disabled ? "disabled-unit" : ""} ${mine ? "" : "locked-unit"} ${isSelected ? "selected-detail" : ""} ${targetable ? "targetable" : ""}" data-unit="${seat}|${lane}|${u.instanceId}" title="${mine ? "" : "Opponent's unit — view only"}">
      <img src="${getCardImage(u.name)}" alt="${u.name}">
      ${dmgBuff ? `<div class="uc-badge uc-badge-dmg" title="Damage buff (status)">⚔+${dmgBuff.amount || 0}${dmgBuff.multiplier ? "×" + dmgBuff.multiplier : ""}</div>` : ""}
      ${showContinuousBadge ? `<div class="uc-badge uc-badge-dmg" title="Passive damage bonus">⚔+${continuousDmgBonus}</div>` : ""}
      ${overHeal > 0 ? `<div class="uc-badge uc-badge-overheal" title="Over health">♥+${overHeal}</div>` : ""}
      ${immune ? `<div class="uc-badge uc-badge-immune" title="Immune to damage">✦</div>` : ""}
      ${hasNegate ? `<div class="uc-badge uc-badge-negate" title="Next hit negated">🛡</div>` : ""}
      ${hasReflect ? `<div class="uc-badge uc-badge-negate" title="Reflects next hit">↩</div>` : ""}
      ${unitMode ? `<div class="uc-badge uc-badge-mode" title="Current mode">${unitMode}</div>` : ""}
      ${copiedPassiveName ? `<div class="uc-badge uc-badge-copied-passive" title="Copying ${copiedPassiveName}'s passive">${getCardImage(copiedPassiveName) ? `<img src="${getCardImage(copiedPassiveName)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;display:block">` : `<span style="font-size:7px;font-weight:700;color:var(--accent)">${copiedPassiveName.substring(0,2).toUpperCase()}</span>`}</div>` : ""}
      <div class="uc-name">${u.name}</div>
      <div class="uc-hp"><span class="${lowHp ? "hp-low" : ""}">${u.hp}</span>/${effectiveMaxHp}${overHeal > 0 ? ` <span class="uc-overhp-tag">+${overHeal}</span>` : ""}</div>
      ${disabled ? `<div class="uc-disabled-tag">DISABLED</div>` : ""}
    </div>
  `;
}

// ---------------- Side detail panel (replaces the old center-screen unit popup) ----------------
// ---------------- Detail panel (engine-aware) ----------------
function detailPanelHtml() {
  if (!detailState) {
    return `<div class="detail-panel panel"><div class="detail-panel-empty">Select a character on the board to see its info here.</div></div>`;
  }
  const { seat, lane, instanceId } = detailState;
  const p = game.players[seat];
  const lk = laneKey(lane);
  const u = p[lk] ? p[lk].find(x => x.instanceId === instanceId) : null;
  if (!u) {
    detailState = null;
    return `<div class="detail-panel panel"><div class="detail-panel-empty">Select a character on the board to see its info here.</div></div>`;
  }
  const def = cardDef(u.name);
  const canControl = isMine(seat);
  const eng = ensureEngine();
  const auto = isAutoResolvable(u.name);
  const cont = auto ? getContinuousStateCached(u) : null;
  const effectiveMaxHp = cont ? u.maxHp + cont.maxHpBonus : u.maxHp;

  // If an action targeting flow is in progress for THIS unit, show the
  // in-progress picker instead of the normal action buttons.
  const targeting = actionTargetState && actionTargetState.instanceId === instanceId ? actionTargetState : null;

  return `
    <div class="detail-panel panel">
      <div class="dp-head">
        <img src="${getCardImage(u.name)}" alt="${u.name}">
        <div>
          <div class="dp-title">${u.name}</div>
          <div class="dp-sub">${def.pronouns || ""} · Cost ${def.cost} · ${lane} lane${cont && cont.fullyImmune ? " · <span style='color:var(--accent)'>Immune</span>" : ""}</div>
        </div>
        <button class="ghost icon-btn dp-close" id="closeDetailBtn">✕</button>
      </div>

      ${canControl ? "" : `<div class="dp-ownership-note">This is Player ${seat}'s unit. You can see everything about it, but only they can act with it.</div>`}

      <div class="hp-control">
        <div class="hp-display">${u.hp}<span class="hp-max"> / ${effectiveMaxHp}</span>${u.hp > effectiveMaxHp ? `<span class="hp-overheal-tag">♥ +${u.hp - effectiveMaxHp} over health</span>` : ""}</div>
      </div>

      ${statusListHtml(u)}

      ${!auto ? `<div class="dp-ownership-note">This is a DLC card without automatic resolution — track it manually with your group.</div>` : ""}

      ${auto && canControl && !targeting ? actionButtonsHtml(seat, lane, u, def, eng) : ""}
      ${targeting ? targetPickerHtml(seat, lane, u, targeting) : ""}

      <div class="dp-section">
        <div class="dp-section-label">Passive — ${def.passiveName}</div>
        <div class="ability-row passive"><div class="ab-label">Passive</div>${def.passive}</div>
      </div>
      <div class="dp-section">
        <div class="dp-section-label">Actions (reference text)</div>
        <div class="ability-row"><div class="ab-label">Action 1 · Cost ${def.actionsData ? def.actionsData[0].cost : 1}</div>${def.a1}</div>
        <div class="ability-row"><div class="ab-label">Action 2 · Cost ${def.actionsData ? def.actionsData[1].cost : 2}</div>${def.a2}</div>
        <div class="ability-row"><div class="ab-label">Action 3 · Cost ${def.actionsData ? def.actionsData[2].cost : 3}</div>${def.a3}</div>
      </div>



      ${canControl ? `
      <div class="dp-section">
        <div class="dp-section-label">Move to lane</div>
        <div class="move-lane-options">
          ${LANES.filter(l => l !== lane).map(l => `<button data-move="${l}">${l}</button>`).join("")}
        </div>
      </div>
      ` : ""}

      ${canControl ? `<div class="dp-actions"><button class="danger" id="defeatBtn">Defeat → Graveyard</button></div>` : ""}
    </div>
  `;
}

function statusListHtml(u) {
  if (!u.statuses || u.statuses.length === 0) return "";
  const labels = {
    buff_damage: s => `+${s.amount || 0}${s.multiplier ? ` ×${s.multiplier}` : ""} dmg`,
    halve_damage: () => `Damage halved`,
    negate_damage: () => `Damage negated`,
    redirect_damage: () => `Redirecting damage`,
    disable_actions: () => `Disabled`,
    passive_negated: () => `Passive negated`,
    borrowed_passive_op: s => `Borrowed: ${s.meta && s.meta.op}`,
    temp_heal_rollback: s => `+${s.amount} temp HP`,
  };
  const chips = u.statuses.map(s => `<span class="status-chip">${(labels[s.kind] || (() => s.kind))(s)}</span>`).join("");
  return `<div class="dp-section"><div class="dp-section-label">Active effects</div><div class="status-chips">${chips}</div></div>`;
}

function actionButtonsHtml(seat, lane, u, def, eng) {
  const p = game.players[seat];
  const cont = getContinuousStateCached(u);
  const disabled = hasStatus(u, "disable_actions") || (cont && cont.disabledByLaneController);
  const willBeFree = u.flags && u.flags.nextActionFree;

  // Shared affordability/condition rendering for both the 3 numbered combat
  // actions and the optional 4th manually-activated passive action.
  function actionRow(action, dataAttr, label) {
    if (!action) return `<div class="action-row unavailable"><div class="ab-label">${label}</div><span class="action-na">Not available in current mode</span></div>`;
    const cost = action.cost;
    const conditionOk = !action.condition || eng.checkCondition(action.condition, { actorSeat: seat, actorLane: lane });
    const canAfford = willBeFree || p.energy >= cost;
    const canAct = !disabled && conditionOk && canAfford;
    return `
      <button class="action-btn ${canAct ? "" : "disabled"}" ${dataAttr} ${canAct ? "" : "disabled"}>
        <span class="ab-cost">${willBeFree ? "FREE" : cost + "⚡"}</span>
        <span class="ab-text">${action.text}</span>
      </button>`;
  }

  let rows = "";
  for (let i = 0; i < 3; i++) {
    const cdef = eng.cardDef(u.name);
    const action = eng.lookupAction(cdef, u, i);
    // byMode-resolved actions (Tanker's Robot/Tank variants) carry their own
    // cost/effects but no own .text — only the outer (pre-mode-resolution)
    // actionsData[i] entry has the combined "Robot: X / Tank: Y" description.
    // Stitch it back on so the button doesn't render "undefined".
    const displayAction = action && action.text === undefined && cdef.actions[i]
      ? Object.assign({}, action, { text: cdef.actions[i].text })
      : action;
    rows += actionRow(displayAction, `data-action="${i}"`, `Action ${i + 1}`);
  }

  // Manually-activated passive trigger (Tanker's mode switch, and any future
  // card with the same shape) — a visually distinct 4th row rather than
  // mixed into "Action 4", since it's not one of the card's 3 numbered
  // combat actions; it's the player choosing to spend energy to flip their
  // own passive's state.
  const passiveActionDef = eng.cardDef(u.name).passiveAction;
  let passiveSection = "";
  if (passiveActionDef) {
    const action = eng.lookupAction(eng.cardDef(u.name), u, "passive");
    const alreadyUsed = def.passive && def.passive.oncePerTurn && u.counters && u.counters._passiveUsed;
    const row = actionRow(alreadyUsed ? null : action, `data-passiveaction="1"`, "Passive").replace('class="action-btn', 'class="action-btn passive-action-btn');
    // Show copied passive icon for Crumbs
    const copiedName = u.flags && u.flags.copiedPassiveName;
    const copiedCard = copiedName && CARDS.find(c => c.name === copiedName);
    const copiedBadge = copiedName ? `
      <div class="dp-section" style="display:flex;align-items:center;gap:8px;padding:6px 0">
        <img src="${getCardImage(copiedName)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)">
        <span style="font-size:12px;color:var(--text-secondary)">Copying <strong style="color:var(--text)">${copiedName}</strong>'s passive: <em>${copiedCard ? copiedCard.passive : ""}</em></span>
      </div>` : "";
    passiveSection = `
      ${copiedBadge}
      <div class="dp-section-label" style="margin-top:10px">Passive Action${def.passiveName ? " — " + def.passiveName : ""}${alreadyUsed ? " <span style='color:var(--text-tertiary)'>(used this turn)</span>" : ""}</div>
      <div class="action-list">${row}</div>`;
  }

  return `
    <div class="dp-section">
      <div class="dp-section-label">Actions ${disabled ? "<span class='dp-section-hint'>(disabled this turn)</span>" : ""}</div>
      <div class="action-list">${rows}</div>
      ${passiveSection}
    </div>`;
}

function targetPickerHtml(seat, lane, u, targeting) {
  const need = targeting.needs[targeting.needIndex];
  if (!need) return "";
  let prompt = "";
  let cancel = `<button class="ghost" id="cancelActionBtn">Cancel</button>`;

  if (targeting.pendingCopySource) {
    const src = findUnit(game, targeting.pendingCopySource);
    const srcDef = src ? cardDef(src.unit.name) : null;
    prompt = `
      <div class="targeting-prompt">Copying which action from ${src ? src.unit.name : "?"}?</div>
      <div class="action-list">
        ${[0,1,2].map(i => `<button class="action-btn" data-copyaction="${i}">${srcDef ? [srcDef.a1, srcDef.a2, srcDef.a3][i] : "Action " + (i+1)}</button>`).join("")}
      </div>`;
  } else if (need.kind === "singleTarget" || need.kind === "enemyChoiceAnyLane" || need.kind === "allyChoiceAnyLane" || need.kind === "copySourceInstanceId" || need.kind === "cardChoiceInstanceId") {
    const label = need.kind === "copySourceInstanceId" ? (
      actionTargetState && actionTargetState.action && actionTargetState.action.effects && actionTargetState.action.effects.some(e => e.op === "copy_passive")
        ? "Pick an ally in this lane whose Passive to copy."
        : "Pick an ally in this lane whose ability to copy."
    )
      : need.allow === "ally" || need.kind === "allyChoiceAnyLane" ? "Pick an ally."
      : need.kind === "cardChoiceInstanceId" ? `Pick ${need.pairNames.join(" or ")}.`
      : "Pick a target on the board.";
    prompt = `<div class="targeting-prompt">${label}</div>`;
  } else if (need.kind === "lane" || need.kind === "destination") {
    prompt = `
      <div class="targeting-prompt">${need.kind === "destination" ? "Move to which lane?" : "Target which lane?"}</div>
      <div class="move-lane-options">
        ${LANES.filter(l => need.kind !== "destination" || l !== lane).map(l => `<button data-pickLane="${l}">${l}</button>`).join("")}
      </div>`;
  } else if (need.kind === "stealCardIndex") {
    const oppSeat = seat === "1" ? "2" : "1";
    const oppHand = game.players[oppSeat].hand;
    prompt = `
      <div class="targeting-prompt">Pick a card from the opponent's hand to steal.</div>
      <div class="hand-strip" style="flex-wrap:wrap;min-height:auto">
        ${oppHand.map((name, i) => `<div class="mini-card" style="width:54px;height:54px" data-stealpick="${i}"><img src="${getCardImage(name)}" alt="?"></div>`).join("")}
      </div>`;
  } else if (need.kind === "handCardChoice") {
    const oppSeat = seat === "1" ? "2" : "1";
    const oppHand = game.players[oppSeat].hand;
    prompt = `
      <div class="targeting-prompt">View opponent's hand — pick a card to increase its cost by 2.</div>
      <div class="hand-strip" style="flex-wrap:wrap;min-height:auto">
        ${oppHand.map(name => `<div class="mini-card" style="width:54px;height:54px" data-handpick="${escapeHtml(name)}"><img src="${getCardImage(name)}" alt="${name}"></div>`).join("")}
      </div>`;
  } else if (need.kind === "summonCardChoice") {
    const myHand = game.players[seat].hand;
    prompt = `
      <div class="targeting-prompt">Pick a card from your hand to summon for free.</div>
      <div class="hand-strip" style="flex-wrap:wrap;min-height:auto">
        ${myHand.length === 0 ? `<div class="empty-hint">Your hand is empty</div>` : myHand.map(name => `<div class="mini-card" style="width:54px;height:54px" data-summonfreepick="${escapeHtml(name)}"><img src="${getCardImage(name)}" alt="${name}"></div>`).join("")}
      </div>`;
  } else if (need.kind === "summonLaneChoice") {
    prompt = `
      <div class="targeting-prompt">Summon to which lane?</div>
      <div class="move-lane-options">
        ${LANES.map(l => {
          const full = game.players[seat][laneKey(l)].length >= LANE_CAP;
          return `<button ${full ? "disabled" : ""} data-summonfreelane="${l}">${l}${full ? " (full)" : ""}</button>`;
        }).join("")}
      </div>`;
  }

  return `<div class="dp-section targeting-active">${prompt}${cancel}</div>`;
}

function bindDetailPanelEvents() {
  if (!detailState) return;
  const { seat, lane, instanceId } = detailState;
  const closeBtn = document.getElementById("closeDetailBtn");
  if (closeBtn) closeBtn.onclick = () => { detailState = null; actionTargetState = null; render(); };

  // Action buttons -> begin (or immediately resolve) a card action.
  document.querySelectorAll("[data-action]").forEach(el => {
    el.onclick = () => beginAction(seat, instanceId, Number(el.dataset.action));
  });
  // Manually-activated passive action (e.g. Tanker's mode switch) — same
  // beginAction flow as numbered combat actions, just keyed by the
  // "passive" sentinel instead of a numeric index.
  document.querySelectorAll("[data-passiveaction]").forEach(el => {
    el.onclick = () => beginAction(seat, instanceId, "passive");
  });

  // Target-picker controls (only present while actionTargetState is active
  // for this unit).
  document.querySelectorAll("[data-pickLane]").forEach(el => {
    el.onclick = () => provideLane(el.dataset.picklane);
  });
  document.querySelectorAll("[data-copyaction]").forEach(el => {
    el.onclick = () => provideCopyActionIndex(Number(el.dataset.copyaction));
  });
  document.querySelectorAll("[data-stealpick]").forEach(el => {
    el.onclick = () => provideStealCardIndex(Number(el.dataset.stealpick));
  });
  document.querySelectorAll("[data-handpick]").forEach(el => {
    el.onclick = () => provideHandCardChoice(el.dataset.handpick);
  });
  document.querySelectorAll("[data-summonfreepick]").forEach(el => {
    el.onclick = () => provideSummonCardChoice(el.dataset.summonfreepick);
  });
  document.querySelectorAll("[data-summonfreelane]").forEach(el => {
    el.onclick = () => provideSummonLaneChoice(el.dataset.summonfreelane);
  });
  const cancelBtn = document.getElementById("cancelActionBtn");
  if (cancelBtn) cancelBtn.onclick = cancelAction;

  // Generic correction tools.
  document.querySelectorAll("[data-correctheal]").forEach(el => {
    el.onclick = () => genericHeal(seat, instanceId, Number(el.dataset.correctheal));
  });
  document.querySelectorAll("[data-correctdmg]").forEach(el => {
    el.onclick = () => genericDamage(seat, instanceId, Number(el.dataset.correctdmg));
  });
  document.querySelectorAll("[data-correctdisable]").forEach(el => {
    el.onclick = () => genericDisableToggle(seat, instanceId);
  });

  // Move-to-lane (unchanged from before, now routes through the engine).
  document.querySelectorAll("[data-move]").forEach(el => {
    el.onclick = () => { moveUnit(seat, lane, instanceId, el.dataset.move); };
  });
  const defeatBtn = document.getElementById("defeatBtn");
  if (defeatBtn) defeatBtn.onclick = () => { defeatUnit(seat, lane, instanceId); };
}

// ---------------- Modal (kept only for self-only summon flows) ----------------
function renderModal() {
  let html = "";
  if (modalState.type === "addUnit") {
    html = addUnitModalHtml();
  } else if (modalState.type === "summon") {
    html = summonModalHtml();
  } else if (modalState.type === "viewCard") {
    html = viewCardModalHtml();
  }
  // Update the existing backdrop in place if one is already mounted, instead
  // of removing and recreating it. Recreating it on every render (including
  // the 2.5s background poll, which re-renders even while a modal is open)
  // replaces the close button with a brand-new DOM node each time — if a
  // click lands at the same moment as one of those refreshes, the click can
  // hit a button that's mid-replacement and silently do nothing, making the
  // modal feel stuck.
  let wrap = document.querySelector(".modal-backdrop");
  if (!wrap) {
    wrap = document.createElement("div");
    wrap.className = "modal-backdrop";
    wrap.onclick = (e) => { if (e.target === wrap) closeModal(); };
    app.appendChild(wrap);
  }
  wrap.innerHTML = `<div class="modal">${html}</div>`;
  bindModalEvents();
}

function closeModal() { modalState = null; render(); }

function addUnitModalHtml() {
  const { seat, lane } = modalState;
  const p = game.players[seat];
  const eng = ensureEngine();
  const freeSummonGrantor = eng ? eng.findActiveUnitGrantingFreeSummon(seat) : null;
  const freeSummonAvailable = !!(freeSummonGrantor && !freeSummonGrantor.counters.freeSummonUsed);
  const useFree = freeSummonAvailable && !!modalState.useCordeliaFree;
  return `
    <div class="modal-head">
      <div><div class="mh-title">Summon to ${lane}</div><div class="mh-sub">Choose a card from your hand</div></div>
      <button class="ghost icon-btn modal-close" id="closeModalBtn">✕</button>
    </div>
    ${freeSummonAvailable ? `
    <label class="cordelia-free-toggle" style="margin-bottom:10px">
      <input type="checkbox" id="useCordeliaFreeCheckbox" ${useFree ? "checked" : ""}>
      Use ${freeSummonGrantor.name}'s free summon this turn
    </label>` : ""}
    <div class="hand-strip" style="flex-wrap:wrap;min-height:auto">
      ${p.hand.length === 0 ? `<div class="empty-hint">Your hand is empty</div>` : p.hand.map(name => {
        const c = cardDef(name);
        const afford = useFree || p.energy >= c.cost;
        return `<div class="mini-card" style="width:54px;height:54px;${afford ? "" : "opacity:0.4"}" data-summonpick="${escapeHtml(name)}">
          <img src="${getCardImage(name)}" alt="${name}">
        </div>`;
      }).join("")}
    </div>
  `;
}

function summonModalHtml() {
  const { seat, name } = modalState;
  const p = game.players[seat];
  const c = cardDef(name);

  // Cordelia ("while active, one character can be summoned for free per
  // turn") — surfaced as an opt-in checkbox rather than auto-applied, since
  // the player may want to save the free summon for something else this
  // turn. eng.findActiveUnitGrantingFreeSummon mirrors the engine's own
  // eligibility check (passive_negated, continuous trigger, op present)
  // exactly, so this can't drift out of sync with what summon() will
  // actually allow.
  const eng = ensureEngine();
  const freeSummonGrantor = eng ? eng.findActiveUnitGrantingFreeSummon(seat) : null;
  const freeSummonAvailable = !!(freeSummonGrantor && !freeSummonGrantor.counters.freeSummonUsed);
  const useFree = freeSummonAvailable && !!modalState.useCordeliaFree;

  const afford = useFree || p.energy >= c.cost;
  return `
    <div class="modal-head">
      <img src="${getCardImage(name)}" alt="${name}" style="width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border-strong)">
      <div>
        <div class="mh-title">${name}</div>
        <div class="mh-sub">${c.pronouns || ""} · Cost ${useFree ? "Free" : c.cost} · HP ${c.hp}</div>
      </div>
      <button class="ghost icon-btn modal-close" id="closeModalBtn">✕</button>
    </div>
    <div class="dp-section">
      <div class="dp-section-label">Passive — ${c.passiveName}</div>
      <div class="ability-row passive"><div class="ab-label">Passive</div>${c.passive}</div>
    </div>
    <div class="dp-section">
      <div class="dp-section-label">Actions</div>
      <div class="ability-row"><div class="ab-label">Action 1 · Cost 1</div>${c.a1}</div>
      <div class="ability-row"><div class="ab-label">Action 2 · Cost 2</div>${c.a2}</div>
      <div class="ability-row"><div class="ab-label">Action 3 · Cost 3</div>${c.a3}</div>
    </div>
    ${freeSummonAvailable ? `
    <div class="dp-section">
      <label class="cordelia-free-toggle">
        <input type="checkbox" id="useCordeliaFreeCheckbox" ${useFree ? "checked" : ""}>
        Use ${freeSummonGrantor.name}'s free summon this turn
      </label>
    </div>` : ""}
    ${!afford ? `<p style="color:var(--danger);font-size:12px">Not enough energy (need ${c.cost}, have ${p.energy})</p>` : ""}
    ${!isAutoResolvable(name) ? `<div class="dp-ownership-note">This is a DLC card without automatic resolution data — you'll need to track its actions manually with your group after summoning.</div>` : ""}
    <div class="dp-section">
      <div class="dp-section-label">Summon to lane</div>
      <div class="move-lane-options">
        ${LANES.map(l => {
          const full = p[laneKey(l)].length >= LANE_CAP;
          return `<button ${!afford || full ? "disabled" : ""} data-summonlane="${l}">${l}${full ? " (full)" : ""}</button>`;
        }).join("")}
      </div>
    </div>
  `;
}

function viewCardModalHtml() {
  const { name, seat, graveyardIndex } = modalState;
  const c = cardDef(name);
  return `
    <div class="modal-head">
      <img src="${getCardImage(name)}" alt="${name}" style="width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border-strong)">
      <div>
        <div class="mh-title">${name}</div>
        <div class="mh-sub">${c.pronouns || ""} · Cost ${c.cost} · HP ${c.hp}</div>
      </div>
      <button class="ghost icon-btn modal-close" id="closeModalBtn">✕</button>
    </div>
    <div class="dp-ownership-note">Defeated — Player ${seat}'s graveyard, slot ${graveyardIndex + 1}. This is a read-only reference; the card has no live HP or buffs anymore.</div>
    <div class="dp-section">
      <div class="dp-section-label">Passive — ${c.passiveName}</div>
      <div class="ability-row passive"><div class="ab-label">Passive</div>${c.passive}</div>
    </div>
    <div class="dp-section">
      <div class="dp-section-label">Actions</div>
      <div class="ability-row"><div class="ab-label">Action 1 · Cost 1</div>${c.a1}</div>
      <div class="ability-row"><div class="ab-label">Action 2 · Cost 2</div>${c.a2}</div>
      <div class="ability-row"><div class="ab-label">Action 3 · Cost 3</div>${c.a3}</div>
    </div>
  `;
}


function bindModalEvents() {
  const closeBtn = document.getElementById("closeModalBtn");
  if (closeBtn) closeBtn.onclick = closeModal;

  if (modalState.type === "addUnit") {
    const { seat, lane } = modalState;
    const freeCheckbox = document.getElementById("useCordeliaFreeCheckbox");
    if (freeCheckbox) {
      freeCheckbox.onchange = () => {
        modalState.useCordeliaFree = freeCheckbox.checked;
        renderModal();
      };
    }
    document.querySelectorAll("[data-summonpick]").forEach(el => {
      el.onclick = () => summonFromHand(seat, el.dataset.summonpick, lane, { useCordeliaFree: !!modalState.useCordeliaFree });
    });
  } else if (modalState.type === "summon") {
    const { seat, name } = modalState;
    const freeCheckbox = document.getElementById("useCordeliaFreeCheckbox");
    if (freeCheckbox) {
      freeCheckbox.onchange = () => {
        modalState.useCordeliaFree = freeCheckbox.checked;
        renderModal();
      };
    }
    document.querySelectorAll("[data-summonlane]").forEach(el => {
      el.onclick = () => summonFromHand(seat, name, el.dataset.summonlane, { useCordeliaFree: !!modalState.useCordeliaFree });
    });
  }
}

// ---------------- Init ----------------
loadGame();
if (mySeat !== null) { startPolling(); startClockTick(); }
</script>
